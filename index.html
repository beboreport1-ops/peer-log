<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Peer Log Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg:#0a0e0d;
    --panel:#0f1614;
    --line:#1c2b27;
    --text:#d7e5df;
    --dim:#6d8079;
    --accent:#39ff9d;
    --accent-dim:#1f8a5c;
    --warn:#ffb454;
    --danger:#ff6161;
    --mono: 'JetBrains Mono','Consolas',monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      linear-gradient(180deg, rgba(57,255,157,0.03), transparent 200px),
      var(--bg);
    color:var(--text);
    font-family:var(--mono);
    min-height:100vh;
    padding:32px 20px 60px;
  }
  .wrap{max-width:1000px;margin:0 auto;}

  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:1px solid var(--line);
    padding-bottom:16px;
    margin-bottom:24px;
    gap:16px;
    flex-wrap:wrap;
  }
  h1{
    font-size:15px;
    letter-spacing:.18em;
    text-transform:uppercase;
    margin:0;
    color:var(--text);
    font-weight:600;
  }
  h1 span{color:var(--accent);}
  .sub{color:var(--dim);font-size:11px;letter-spacing:.05em;margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--dim);display:inline-block;}
  .dot.synced{background:var(--accent);box-shadow:0 0 6px var(--accent);}
  .dot.syncing{background:var(--warn);animation:pulse 1s infinite;}
  .dot.err{background:var(--danger);}
  .dot.warn{background:var(--warn);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .role-tag{
    font-size:9.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:1px 7px;
    border-radius:20px;
    border:1px solid var(--line);
    color:var(--dim);
  }
  .role-tag.admin{color:var(--warn);border-color:#5a4520;}
  .logout-link{
    background:none;border:none;color:var(--dim);
    font-family:var(--mono);font-size:10.5px;
    text-decoration:underline;cursor:pointer;letter-spacing:.03em;
    padding:0;
  }
  .logout-link:hover{color:var(--accent);}
  .count{
    font-size:11px;
    color:var(--dim);
    letter-spacing:.05em;
    text-align:right;
  }
  .count b{color:var(--accent);font-size:15px;display:block;font-weight:600;}

  .dropzone{
    border:1px dashed var(--line);
    background:var(--panel);
    border-radius:2px;
    padding:28px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, background .15s;
    margin-bottom:20px;
    display:block;
  }
  .dropzone:hover, .dropzone.drag{
    border-color:var(--accent-dim);
    background:#0d1a15;
  }
  .dropzone p{margin:0;color:var(--dim);font-size:12px;letter-spacing:.03em;}
  .dropzone p.main{color:var(--text);font-size:13px;margin-bottom:6px;}
  .dropzone .accent{color:var(--accent);}
  input[type=file]{display:none;}

  .toolbar{
    display:flex;
    gap:10px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .search{
    flex:1;
    min-width:180px;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    padding:9px 12px;
    font-family:var(--mono);
    font-size:12px;
    border-radius:2px;
    outline:none;
  }
  .search:focus{border-color:var(--accent-dim);}
  .search::placeholder{color:var(--dim);}

  .btn{
    background:transparent;
    border:1px solid var(--line);
    color:var(--dim);
    padding:9px 14px;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.05em;
    text-transform:uppercase;
    border-radius:2px;
    cursor:pointer;
    transition:.15s;
    white-space:nowrap;
  }
  .btn:hover{border-color:var(--accent-dim);color:var(--accent);}
  .btn.primary{color:var(--accent);border-color:var(--accent-dim);}
  .btn.primary:hover{background:rgba(57,255,157,0.08);}
  .btn.danger{color:var(--dim);}
  .btn.danger:hover{border-color:var(--danger);color:var(--danger);background:rgba(255,97,97,0.06);}
  .btn:disabled{opacity:.5;cursor:default;}

  section.block{margin-bottom:28px;}
  .block-title{
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--dim);
    margin:0 0 8px 2px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .block-title .n{color:var(--accent);}

  table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:2px;
    overflow:hidden;
    font-size:12.5px;
  }
  thead th{
    text-align:left;
    padding:10px 14px;
    color:var(--dim);
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    font-size:10.5px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
  }
  thead th:hover{color:var(--accent);}
  thead th.sorted{color:var(--accent);}
  thead th .arrow{opacity:.6;margin-left:4px;font-size:9px;}
  tbody td{
    padding:9px 14px;
    border-bottom:1px solid #131c19;
    color:var(--text);
    vertical-align:top;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr.main-row{cursor:pointer;}
  tbody tr.main-row:hover{background:#0d1a15;}
  tbody tr.main-row:hover td:nth-child(2){color:var(--accent);}

  .ip{color:#8fb5a8;}
  .label-input{
    width:100%;
    min-width:70px;
    background:transparent;
    border:1px solid transparent;
    color:var(--text);
    font-family:var(--mono);
    font-size:12px;
    padding:5px 7px;
    border-radius:3px;
    outline:none;
  }
  .label-input::placeholder{color:var(--line);}
  .label-input:hover{border-color:var(--line);}
  .label-input:focus{border-color:var(--accent-dim);background:var(--bg);}
  .label-static{color:var(--dim);font-size:12px;padding:5px 7px;display:block;}

  .ip-cell{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .icon-btn{
    background:none;
    border:none;
    color:var(--dim);
    cursor:pointer;
    font-size:12px;
    padding:1px 4px;
    border-radius:3px;
    line-height:1;
    opacity:.6;
    transition:.12s;
  }
  .icon-btn:hover{opacity:1;color:var(--accent);background:rgba(57,255,157,0.08);}
  .icon-btn.copied{color:var(--accent);opacity:1;}
  .icon-btn.del-btn:hover{color:var(--danger);background:rgba(255,97,97,0.1);}
  .icon-btn.eye-btn:hover{color:var(--warn);background:rgba(255,180,84,0.1);}

  .badge{
    display:inline-block;
    font-size:10px;
    letter-spacing:.03em;
    color:var(--accent);
    border:1px solid var(--accent-dim);
    background:rgba(57,255,157,0.06);
    padding:2px 7px;
    border-radius:20px;
    margin-left:8px;
    cursor:pointer;
    white-space:nowrap;
  }
  .badge:hover{background:rgba(57,255,157,0.14);}
  .caret{display:inline-block;transition:transform .12s;margin-right:6px;color:var(--dim);}
  tr.expanded .caret{transform:rotate(90deg);}

  tr.hist-row td{
    background:#0c1512;
    padding:6px 14px 6px 34px;
    font-size:11.5px;
    color:var(--dim);
    border-bottom:1px solid #101a17;
  }
  tr.hist-row td.ip{color:#6f9b8b;}
  tr.hist-row.newest td{color:#a9c9bf;}
  .hist-tag{
    font-size:9px;
    color:var(--bg);
    background:var(--accent-dim);
    padding:1px 6px;
    border-radius:20px;
    margin-left:8px;
    letter-spacing:.05em;
  }

  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--dim);
    font-size:12px;
    border:1px solid var(--line);
    background:var(--panel);
    border-radius:2px;
  }
  .empty .accent{color:var(--accent);}

  .unlabeled-note{
    font-size:11px;
    color:var(--dim);
    margin:0 0 8px 2px;
    line-height:1.5;
  }
  .warn{color:var(--warn);}

  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(0);
    background:var(--panel);
    border:1px solid var(--accent-dim);
    color:var(--accent);
    padding:9px 18px;
    border-radius:20px;
    font-size:11.5px;
    letter-spacing:.03em;
    opacity:0;
    pointer-events:none;
    transition:opacity .15s, transform .15s;
    max-width:80vw;
    text-align:center;
    z-index:200;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
  .toast.err{border-color:var(--danger);color:var(--danger);}

  footer{
    margin-top:24px;
    text-align:center;
    color:var(--line);
    font-size:10px;
    letter-spacing:.1em;
  }

  /* ---- gate screen ---- */
  .gate-screen{
    min-height:80vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .gate-box{
    width:100%;
    max-width:320px;
    text-align:center;
  }
  .gate-title{
    font-size:15px;
    letter-spacing:.18em;
    text-transform:uppercase;
    margin:0 0 6px;
  }
  .gate-title span{color:var(--accent);}
  .gate-sub{color:var(--dim);font-size:11.5px;margin:0 0 18px;}
  .gate-tabs{
    display:flex;
    border:1px solid var(--line);
    border-radius:2px;
    overflow:hidden;
    margin-bottom:18px;
  }
  .gate-tab{
    flex:1;
    background:var(--panel);
    border:none;
    color:var(--dim);
    padding:9px 0;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.05em;
    text-transform:uppercase;
    cursor:pointer;
  }
  .gate-tab.active{color:var(--accent);background:#0d1a15;}
  .gate-input{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    padding:11px 14px;
    font-family:var(--mono);
    font-size:13px;
    border-radius:2px;
    outline:none;
    margin-bottom:10px;
  }
  .gate-input:focus{border-color:var(--accent-dim);}
  .gate-error{color:var(--danger);font-size:11px;margin:0 0 10px;min-height:14px;}
  .gate-submit{width:100%;}

  /* ---- modal ---- */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.6);
    display:flex;align-items:center;justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-box{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:3px;
    padding:22px;
    width:100%;
    max-width:320px;
  }
  .modal-box h3{
    margin:0 0 14px;
    font-size:12.5px;
    letter-spacing:.05em;
    text-transform:uppercase;
    color:var(--text);
  }
  .modal-label{
    display:block;
    font-size:10.5px;
    color:var(--dim);
    letter-spacing:.04em;
    margin-bottom:12px;
  }
  .modal-input{
    display:block;
    width:100%;
    margin-top:6px;
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--text);
    padding:9px 11px;
    font-family:var(--mono);
    font-size:12.5px;
    border-radius:2px;
    outline:none;
  }
  .modal-input:focus{border-color:var(--accent-dim);}
  .modal-error{color:var(--danger);font-size:11px;margin:0 0 12px;display:none;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;}

  @media (max-width:520px){
    thead th:nth-child(4), tbody td:nth-child(4){display:none;}
    .label-input{min-width:50px;font-size:11px;}
  }
</style>
</head>
<body>

<div id="gateScreen"></div>

<div class="wrap" id="app" style="display:none;">

  <header>
    <div>
      <h1>PEER<span>_</span>LOG</h1>
      <div class="sub">
        <span class="dot" id="syncDot"></span><span id="syncLabel">connecting...</span>
        <span class="role-tag" id="roleTag"></span>
        <button class="logout-link" id="logoutBtn">log out</button>
      </div>
    </div>
    <div class="count" id="count"><b>0</b>players loaded</div>
  </header>

  <label class="dropzone" id="dropzone" style="display:none;">
    <input type="file" id="fileInput" accept=".csv" multiple>
    <p class="main">Drop <span class="accent">.csv</span> file(s) here, or click to browse</p>
    <p>expects columns: PSN ID (username/player), IP, location — synced to the cloud; if you're offline it queues and syncs automatically once you're back online</p>
  </label>

  <div class="toolbar" id="toolbar" style="display:none;">
    <input class="search" id="search" placeholder="filter by PSN ID, ip, or location...">
    <button class="btn primary" id="exportBtn">Export filtered CSV</button>
    <button class="btn" id="changePassBtn" style="display:none;">Change Password</button>
  </div>

  <div id="mainHolder"></div>
  <div id="unlabeledHolder"></div>

  <footer>-- end of log --</footer>
</div>

<div class="toast" id="toast">copied</div>

<script>
// ---- Supabase config (public/publishable key — safe to expose client-side,
// actual access is restricted by RLS policies + the password/key gate below) ----
const SUPABASE_URL = 'https://kimgthhwggzudpdediga.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3vpCzgVNaI1LDQstLz9_dw_Lv8jCRnf';

let rawRows = [];
let users = [];
let unlabeled = [];
let sortKey = 'username';
let sortDir = 1;
let expanded = new Set();
let labels = new Map();    // username_key -> {label, hidden}
let ipHidden = new Map();  // ip -> boolean
let passwordHash = null;
let keyHash = null;
let role = null;           // 'view' | 'admin'

const appEl = document.getElementById('app');
const gateScreenEl = document.getElementById('gateScreen');
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const toolbar = document.getElementById('toolbar');
const search = document.getElementById('search');
const mainHolder = document.getElementById('mainHolder');
const unlabeledHolder = document.getElementById('unlabeledHolder');
const countEl = document.getElementById('count');
const exportBtn = document.getElementById('exportBtn');
const changePassBtn = document.getElementById('changePassBtn');
const roleTag = document.getElementById('roleTag');
const logoutBtn = document.getElementById('logoutBtn');
const toast = document.getElementById('toast');
const syncDot = document.getElementById('syncDot');
const syncLabel = document.getElementById('syncLabel');

function setSyncStatus(state, msg){
  syncDot.className = 'dot ' + state;
  syncLabel.textContent = msg;
}
function isAdmin(){ return role === 'admin'; }

// ---------- offline upload queue ----------
// New CSV rows are queued in localStorage first, then we try to push them to
// Supabase right away. If that fails (no connection), they stay queued and
// get retried automatically when the browser comes back online.
const PENDING_KEY = 'peerlog_pending_uploads';
function getPendingRows(){
  try{ return JSON.parse(localStorage.getItem(PENDING_KEY) || '[]'); }
  catch(e){ return []; }
}
function setPendingRows(rows){
  try{ localStorage.setItem(PENDING_KEY, JSON.stringify(rows)); }catch(e){ console.error(e); }
}
function updateSyncIndicator(){
  const n = getPendingRows().length;
  if(n > 0){
    setSyncStatus('warn', `${n} row${n>1?'s':''} queued — waiting for connection`);
  } else if(navigator.onLine === false){
    setSyncStatus('warn', 'offline');
  } else {
    setSyncStatus('synced', 'synced');
  }
}
let flushInFlight = false;
async function flushPendingUploads(){
  if(flushInFlight) return;
  const pending = getPendingRows();
  if(!pending.length) return;
  if(navigator.onLine === false){ updateSyncIndicator(); return; }
  flushInFlight = true;
  setSyncStatus('syncing', `syncing ${pending.length} queued row${pending.length>1?'s':''}...`);
  try{
    await insertRows(pending);
    setPendingRows([]);
    await refreshFromCloud();
    showToast(`synced ${pending.length} queued row${pending.length>1?'s':''}`);
  }catch(e){
    console.error(e);
    updateSyncIndicator();
  }
  flushInFlight = false;
}
window.addEventListener('online', flushPendingUploads);
window.addEventListener('offline', updateSyncIndicator);
setInterval(flushPendingUploads, 15000);

// ---------- hashing ----------
async function sha256Hex(str){
  const enc = new TextEncoder().encode(str || '');
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}

// ---------- Supabase REST helpers ----------
async function sbFetch(path, options={}){
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      ...(options.headers||{})
    }
  });
  if(!res.ok){
    const text = await res.text().catch(()=> '');
    throw new Error(text || res.statusText || 'request failed');
  }
  if(res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
const loadAllRows = () => sbFetch('peer_rows?select=id,username,ip,location&order=id.asc');
const insertRows = (rows) => sbFetch('peer_rows', {
  method:'POST',
  headers:{'Prefer':'return=minimal'},
  body: JSON.stringify(rows)
});
const deleteRowsByIds = (ids) => sbFetch(`peer_rows?id=in.(${ids.join(',')})`, {method:'DELETE'});
const loadLabels = () => sbFetch('peer_labels?select=username_key,label,hidden');
const saveLabelRemote = (usernameKey, label, hidden) => sbFetch('peer_labels?on_conflict=username_key', {
  method:'POST',
  headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},
  body: JSON.stringify([{username_key: usernameKey, label, hidden}])
});
const loadIpHidden = () => sbFetch('peer_ip_hidden?select=ip,hidden');
const saveIpHiddenRemote = (ip, hidden) => sbFetch('peer_ip_hidden?on_conflict=ip', {
  method:'POST',
  headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},
  body: JSON.stringify([{ip, hidden}])
});
const patchAuth = (fields) => sbFetch('peer_log_auth?id=eq.1', {
  method:'PATCH',
  headers:{'Prefer':'return=minimal'},
  body: JSON.stringify(fields)
});

// ---------- generic modal ----------
function openModal({title, fields=[], submitLabel='Confirm', danger=false, onSubmit}){
  return new Promise((resolve)=>{
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <h3>${title}</h3>
        <div class="modal-fields">
          ${fields.map(f=>`<label class="modal-label">${f.label}<input class="modal-input" type="${f.type||'text'}" data-field="${f.id}" autocomplete="off"></label>`).join('')}
        </div>
        <p class="modal-error"></p>
        <div class="modal-actions">
          <button class="btn modal-cancel">Cancel</button>
          <button class="btn ${danger?'danger':'primary'} modal-submit">${submitLabel}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const errorEl = overlay.querySelector('.modal-error');
    const submitBtn = overlay.querySelector('.modal-submit');
    const cancelBtn = overlay.querySelector('.modal-cancel');
    const inputs = [...overlay.querySelectorAll('.modal-input')];
    if(inputs[0]) setTimeout(()=>inputs[0].focus(), 30);

    function close(result){ overlay.remove(); resolve(result); }
    function collect(){
      const vals = {};
      inputs.forEach(inp => vals[inp.dataset.field] = inp.value);
      return vals;
    }
    async function doSubmit(){
      submitBtn.disabled = true;
      const prevLabel = submitBtn.textContent;
      submitBtn.textContent = '...';
      try{
        const result = await onSubmit(collect());
        if(result && result.ok){
          close(true);
          return;
        }
        errorEl.textContent = (result && result.message) || 'Failed';
        errorEl.style.display = 'block';
      }catch(e){
        errorEl.textContent = e.message || 'Error';
        errorEl.style.display = 'block';
      }
      submitBtn.disabled = false;
      submitBtn.textContent = prevLabel;
    }
    cancelBtn.addEventListener('click', ()=>close(false));
    overlay.addEventListener('click', e=>{ if(e.target===overlay) close(false); });
    submitBtn.addEventListener('click', doSubmit);
    inputs.forEach(inp => inp.addEventListener('keydown', e=>{ if(e.key==='Enter') doSubmit(); }));
  });
}
// Admin actions are already gated by the key at login, so admin-only prompts
// are plain confirmations — no repeated credential entry.
function confirmModal({title, submitLabel='Confirm', danger=true, onConfirm}){
  return openModal({
    title, fields:[], submitLabel, danger,
    onSubmit: async () => {
      try{
        await onConfirm();
        return {ok:true};
      }catch(e){
        return {ok:false, message: e.message || 'Action failed — check connection'};
      }
    }
  });
}

// ---------- init / auth ----------
async function init(){
  setSyncStatus('syncing', 'connecting...');
  try{
    const rows = await sbFetch('peer_log_auth?select=*&id=eq.1');
    const row = rows && rows[0];
    if(!row) throw new Error('auth not configured');
    passwordHash = row.password_hash;
    keyHash = row.key_hash;
  }catch(e){
    console.error(e);
    gateScreenEl.innerHTML = `<div class="gate-screen"><div class="gate-box"><p class="gate-error" style="display:block;">Couldn't reach the log. Check your connection and reload the page.</p></div></div>`;
    setSyncStatus('err', 'connection failed');
    return;
  }

  const savedRole = sessionStorage.getItem('peerlog_role');
  if(savedRole === 'view' || savedRole === 'admin'){
    role = savedRole;
    showApp();
  } else {
    showGate();
  }
  setSyncStatus('synced', 'synced');
}

function showGate(){
  appEl.style.display = 'none';
  let tab = 'view';

  function draw(){
    gateScreenEl.innerHTML = `
      <div class="gate-screen">
        <div class="gate-box">
          <h1 class="gate-title">PEER<span>_</span>LOG</h1>
          <p class="gate-sub">${tab==='view' ? 'Enter password to view the log' : 'Enter key for admin access'}</p>
          <div class="gate-tabs">
            <button class="gate-tab ${tab==='view'?'active':''}" data-tab="view">Viewer</button>
            <button class="gate-tab ${tab==='admin'?'active':''}" data-tab="admin">Admin</button>
          </div>
          <input class="gate-input" id="gateInput" type="password" placeholder="${tab==='view'?'password':'key'}" autocomplete="off">
          <p class="gate-error" id="gateError"></p>
          <button class="btn primary gate-submit" id="gateSubmit">${tab==='view'?'Unlock':'Log in as admin'}</button>
        </div>
      </div>`;

    gateScreenEl.querySelectorAll('.gate-tab').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tab = btn.dataset.tab;
        draw();
      });
    });

    const input = document.getElementById('gateInput');
    const err = document.getElementById('gateError');
    const submit = document.getElementById('gateSubmit');
    setTimeout(()=>input.focus(), 30);

    async function tryLogin(){
      submit.disabled = true;
      const hash = await sha256Hex(input.value);
      const expected = tab === 'view' ? passwordHash : keyHash;
      if(hash === expected){
        role = tab;
        sessionStorage.setItem('peerlog_role', role);
        gateScreenEl.innerHTML = '';
        showApp();
      } else {
        err.textContent = tab==='view' ? 'Incorrect password' : 'Incorrect key';
        submit.disabled = false;
      }
    }
    submit.addEventListener('click', tryLogin);
    input.addEventListener('keydown', e => { if(e.key==='Enter') tryLogin(); });
  }
  draw();
}

async function showApp(){
  gateScreenEl.innerHTML = '';
  appEl.style.display = 'block';
  roleTag.textContent = isAdmin() ? 'admin' : 'viewer';
  roleTag.className = 'role-tag' + (isAdmin() ? ' admin' : '');
  dropzone.style.display = isAdmin() ? 'block' : 'none';
  changePassBtn.style.display = isAdmin() ? 'inline-block' : 'none';

  if(isAdmin() && getPendingRows().length){
    await flushPendingUploads();
  }
  if(getPendingRows().length){
    // still queued (offline) — show current cloud data anyway, then restore the queue indicator
    await refreshFromCloud();
    updateSyncIndicator();
  } else {
    await refreshFromCloud();
  }
}

async function openChangePassword(){
  await openModal({
    title: 'Change viewer password',
    fields: [
      {id:'newpass', label:'New password', type:'password'},
      {id:'confirm', label:'Confirm new password', type:'password'}
    ],
    submitLabel: 'Save',
    onSubmit: async (vals) => {
      if(!vals.newpass) return {ok:false, message:'Enter a new password'};
      if(vals.newpass !== vals.confirm) return {ok:false, message:"Passwords don't match"};
      try{
        const newHash = await sha256Hex(vals.newpass);
        await patchAuth({password_hash:newHash});
        passwordHash = newHash;
        showToast('password changed');
        return {ok:true};
      }catch(e){
        return {ok:false, message:'Update failed — check connection'};
      }
    }
  });
}

async function promptToggleUsernameHidden(key, displayName){

// ---------- data loading ----------
async function refreshFromCloud(){
  setSyncStatus('syncing', 'syncing...');
  try{
    const [data, labelData, ipHiddenData] = await Promise.all([loadAllRows(), loadLabels(), loadIpHidden()]);
    rawRows = (data||[]).map(r => ({username:r.username||'', ip:r.ip||'', location:r.location||'', idx:r.id}));
    labels = new Map((labelData||[]).map(l => [l.username_key, {label:l.label||'', hidden:!!l.hidden}]));
    ipHidden = new Map((ipHiddenData||[]).map(r => [r.ip, !!r.hidden]));
    buildGroups();
    toolbar.style.display = 'flex';
    render();
    setSyncStatus('synced', 'synced');
  }catch(e){
    console.error(e);
    setSyncStatus('err', 'sync failed — check connection');
  }
}

function normKey(k){
  const s = k.trim().toLowerCase();
  if(s.includes('user') || s.includes('player') || s.includes('name') || s.includes('gamertag') || s.includes('tag')) return 'username';
  if(s.includes('ip')) return 'ip';
  if(s.includes('city')) return 'city';
  if(s.includes('country')) return 'country';
  if(s.includes('loc')) return 'location';
  return s;
}

function parseFile(file){
  return new Promise(resolve=>{
    Papa.parse(file, {
      header:true,
      skipEmptyLines:true,
      complete: res => {
        const fieldMap = {};
        res.meta.fields.forEach(f => fieldMap[f] = normKey(f));
        const parsed = res.data.map(r => {
          const out = {username:'', ip:'', location:'', city:'', country:''};
          Object.keys(r).forEach(k=>{
            const nk = fieldMap[k];
            const val = (r[k]||'').toString().trim();
            if(nk === 'username' || nk === 'ip' || nk === 'location' || nk === 'city' || nk === 'country'){
              out[nk] = val;
            }
          });
          // Some exports (party-chat) give one combined "location" column.
          // Others (traffic export) give separate City/Country columns —
          // stitch those into the same "City, Country" shape either way.
          if(!out.location){
            out.location = (out.city && out.country) ? `${out.city}, ${out.country}` : (out.city || out.country || '');
          }
          delete out.city;
          delete out.country;
          return out;
        }).filter(r => r.username || r.ip || r.location);
        resolve(parsed);
      },
      error: () => resolve([])
    });
  });
}

async function handleFiles(files){
  if(!isAdmin()) return;
  setSyncStatus('syncing', 'reading file(s)...');
  const results = await Promise.all(files.map(parseFile));
  const allNewRows = results.flat().map(r => ({username:r.username, ip:r.ip, location:r.location}));
  if(!allNewRows.length){
    updateSyncIndicator();
    return;
  }
  const pending = getPendingRows();
  pending.push(...allNewRows);
  setPendingRows(pending);
  showToast(`queued ${allNewRows.length} row${allNewRows.length>1?'s':''}`);
  await flushPendingUploads();
}

function buildGroups(){
  const map = new Map();
  const unlabeledMap = new Map();

  rawRows.forEach(r => {
    if(r.username){
      const key = r.username.toLowerCase();
      if(!map.has(key)) map.set(key, {username:r.username, ipMap:new Map()});
      const g = map.get(key);
      g.username = r.username;
      const existing = g.ipMap.get(r.ip);
      if(existing){
        existing.location = r.location;
        existing.idx = r.idx;
        existing.ids.push(r.idx);
      } else {
        g.ipMap.set(r.ip, {location:r.location, idx:r.idx, ids:[r.idx]});
      }
    } else if(r.ip || r.location){
      const key = r.ip + '|' + r.location;
      if(!unlabeledMap.has(key)) unlabeledMap.set(key, {ip:r.ip, location:r.location, count:0, lastIdx:r.idx, ids:[], labelKey:'unlabeled::'+key});
      const u = unlabeledMap.get(key);
      u.count++;
      u.ids.push(r.idx);
      u.lastIdx = Math.max(u.lastIdx, r.idx);
    }
  });

  users = [...map.values()].map(g => {
    const history = [...g.ipMap.entries()].map(([ip, v]) => ({ip, location:v.location, idx:v.idx, ids:v.ids}));
    history.sort((a,b) => b.idx - a.idx);
    return {
      username: g.username,
      latestIp: history[0].ip,
      latestLocation: history[0].location,
      history
    };
  });

  unlabeled = [...unlabeledMap.values()].sort((a,b) => b.lastIdx - a.lastIdx);
}

function matchesQuery(u, q){
  if(!q) return true;
  if(u.username.toLowerCase().includes(q)) return true;
  return u.history.some(h => h.ip.toLowerCase().includes(q) || h.location.toLowerCase().includes(q));
}

function copyToClipboard(text, btnEl){
  const done = () => {
    showToast(`copied ${text}`);
    if(btnEl){
      btnEl.classList.add('copied');
      setTimeout(()=>btnEl.classList.remove('copied'), 900);
    }
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, cb){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); cb(); }catch(e){}
  document.body.removeChild(ta);
}
let toastTimer;
function showToast(msg, isErr){
  toast.textContent = msg;
  toast.classList.toggle('err', !!isErr);
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove('show'), 1800);
}

function maskUsername(name){
  if(!name) return name;
  return name.slice(0,2) + '••••';
}
function maskIp(ip){
  if(!ip) return ip;
  const parts = ip.split('.');
  if(parts.length === 4){
    return parts.map((p, i) => i===0 ? p : '*'.repeat(p.length)).join('.');
  }
  return '*'.repeat(ip.length);
}

function countryCodeToFlag(code){
  if(!/^[A-Za-z]{2}$/.test(code)) return '';
  const points = [...code.toUpperCase()].map(c => 127397 + c.charCodeAt(0));
  return String.fromCodePoint(...points);
}

const COUNTRY_NAME_TO_CODE = {
  "united states":"US","usa":"US","us":"US","united kingdom":"GB","uk":"GB",
  "peru":"PE","new zealand":"NZ","austria":"AT","puerto rico":"PR",
  "saudi arabia":"SA","canada":"CA","australia":"AU","germany":"DE",
  "france":"FR","spain":"ES","italy":"IT","netherlands":"NL","brazil":"BR",
  "mexico":"MX","japan":"JP","south korea":"KR","china":"CN","india":"IN",
  "russia":"RU","sweden":"SE","norway":"NO","denmark":"DK","finland":"FI",
  "poland":"PL","portugal":"PT","ireland":"IE","belgium":"BE","switzerland":"CH",
  "united arab emirates":"AE","uae":"AE","turkey":"TR","egypt":"EG",
  "south africa":"ZA","argentina":"AR","chile":"CL","colombia":"CO",
  "philippines":"PH","indonesia":"ID","thailand":"TH","vietnam":"VN",
  "malaysia":"MY","singapore":"SG","israel":"IL","greece":"GR","romania":"RO",
  "ukraine":"UA","czech republic":"CZ","hungary":"HU","kuwait":"KW",
  "qatar":"QA","bahrain":"BH","oman":"OM","jordan":"JO","lebanon":"LB",
  "iraq":"IQ","pakistan":"PK","bangladesh":"BD"
};
function countryNameToCode(name){
  if(!name) return '';
  return COUNTRY_NAME_TO_CODE[name.trim().toLowerCase()] || '';
}

function locationCell(location){
  if(!location) return '—';
  const parts = location.split(',');
  const last = parts[parts.length-1].trim();
  const code = /^[A-Za-z]{2}$/.test(last) ? last : countryNameToCode(last);
  const flag = code ? countryCodeToFlag(code) : '';
  return flag ? `${flag} ${escapeHtml(location)}` : escapeHtml(location);
}

async function saveLabel(key, value){
  const current = labels.get(key) || {label:'', hidden:false};
  labels.set(key, {label:value, hidden:current.hidden});
  try{
    await saveLabelRemote(key, value, current.hidden);
  }catch(e){
    console.error(e);
    showToast('label save failed — check connection', true);
  }
}

function ipCell(ip, ids, opts={}){
  const {hidden=false, showEye=false} = opts;
  const safe = escapeHtml(ip);
  const displayValue = hidden ? maskIp(ip) : ip;
  const displaySafe = escapeHtml(displayValue);
  const copySafe = escapeHtml(displayValue);
  const idsAttr = (ids||[]).join(',');
  const copyBtn = ip ? `<button class="icon-btn copy-btn" data-copy="${copySafe}" title="copy IP">⧉</button>` : '';
  const delBtn = (isAdmin() && ids && ids.length) ? `<button class="icon-btn del-btn" data-ids="${idsAttr}" data-ip="${safe}" title="delete this IP">🗑</button>` : '';
  const eyeBtn = (isAdmin() && showEye && ip) ? `<button class="icon-btn eye-btn" data-ip="${safe}" title="${hidden?'unhide':'hide'} this IP">${hidden?'🙈':'👁'}</button>` : '';
  return `<span class="ip-cell"><span class="ip">${displaySafe||'—'}</span>${copyBtn}${eyeBtn}${delBtn}</span>`;
}

function render(){
  const q = search.value.trim().toLowerCase();
  const admin = isAdmin();

  let list = users.filter(u => matchesQuery(u, q));
  list.sort((a,b)=>{
    let va, vb;
    if(sortKey==='ip'){ va=a.latestIp.toLowerCase(); vb=b.latestIp.toLowerCase(); }
    else if(sortKey==='location'){ va=a.latestLocation.toLowerCase(); vb=b.latestLocation.toLowerCase(); }
    else { va=a.username.toLowerCase(); vb=b.username.toLowerCase(); }
    if(va<vb) return -1*sortDir;
    if(va>vb) return 1*sortDir;
    return 0;
  });

  countEl.innerHTML = `<b>${list.length}</b>players${q?` (of ${users.length})`:''}`;

  if(!users.length && !unlabeled.length){
    mainHolder.innerHTML = '';
    unlabeledHolder.innerHTML = '';
    return;
  }

  if(!list.length){
    mainHolder.innerHTML = `<div class="empty">No matches for <span class="accent">"${q}"</span></div>`;
  } else {
    const arrow = key => sortKey===key ? `<span class="arrow">${sortDir>0?'▲':'▼'}</span>` : '';
    const th = (key,label) => `<th class="${sortKey===key?'sorted':''}" data-key="${key}">${label}${arrow(key)}</th>`;

    let rowsHtml = '';
    list.forEach(u => {
      const key = u.username.toLowerCase();
      const isExpanded = expanded.has(key);
      const multi = u.history.length > 1;
      const labelInfo = labels.get(key) || {label:'', hidden:false};
      const nameHidden = labelInfo.hidden;
      const displayName = escapeHtml(nameHidden ? maskUsername(u.username) : u.username);
      const labelCell = admin
        ? `<input class="label-input" data-key="${escapeHtml(key)}" value="${escapeHtml(labelInfo.label)}" placeholder="+ label">`
        : `<span class="label-static">${escapeHtml(labelInfo.label)||'—'}</span>`;
      const nameEye = admin
        ? `<button class="icon-btn eye-btn" data-uname-key="${escapeHtml(key)}" data-uname-display="${escapeHtml(u.username)}" title="${nameHidden?'unhide':'hide'} this row (PSN ID + IPs)">${nameHidden?'🙈':'👁'}</button>`
        : '';
      rowsHtml += `
        <tr class="main-row ${isExpanded?'expanded':''}" data-key="${escapeHtml(key)}">
          <td>${labelCell}</td>
          <td><span class="caret">${multi?'▸':''}</span>${displayName}${nameEye}</td>
          <td>${ipCell(u.latestIp, u.history[0].ids, {hidden:nameHidden, showEye:false})}</td>
          <td>${locationCell(u.latestLocation)}
            ${multi?`<span class="badge" data-key="${escapeHtml(key)}">+${u.history.length-1} more</span>`:''}
          </td>
        </tr>`;
      if(isExpanded){
        u.history.forEach((h, i) => {
          rowsHtml += `
            <tr class="hist-row ${i===0?'newest':''}">
              <td></td>
              <td></td>
              <td>${ipCell(h.ip, h.ids, {hidden:nameHidden, showEye:false})}</td>
              <td>${locationCell(h.location)}${i===0?'<span class="hist-tag">latest</span>':''}</td>
            </tr>`;
        });
      }
    });

    mainHolder.innerHTML = `
      <table>
        <thead><tr>
          <th>Label</th>
          ${th('username','PSN ID')}
          ${th('ip','Latest IP')}
          ${th('location','Latest Location')}
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    `;

    mainHolder.querySelectorAll('thead th').forEach(th=>{
      th.addEventListener('click', ()=>{
        const key = th.dataset.key;
        if(!key) return;
        if(sortKey === key) sortDir *= -1;
        else { sortKey = key; sortDir = 1; }
        render();
      });
    });

    mainHolder.querySelectorAll('.main-row').forEach(tr=>{
      tr.addEventListener('click', (e)=>{
        if(e.target.closest('.badge') || e.target.closest('.icon-btn') || e.target.closest('.label-input')) return;
        const key = tr.dataset.key;
        if(expanded.has(key)) expanded.delete(key);
        else expanded.add(key);
        render();
      });
    });
    mainHolder.querySelectorAll('.badge').forEach(b=>{
      b.addEventListener('click', (e)=>{
        e.stopPropagation();
        const key = b.dataset.key;
        if(expanded.has(key)) expanded.delete(key);
        else expanded.add(key);
        render();
      });
    });
  }

  const filteredUnlabeled = unlabeled.filter(u =>
    !q || u.ip.toLowerCase().includes(q) || u.location.toLowerCase().includes(q)
  );

  if(!filteredUnlabeled.length){
    unlabeledHolder.innerHTML = '';
  } else {
    unlabeledHolder.innerHTML = `
      <section class="block">
        <p class="block-title"><span class="warn">⚠</span> No PSN ID <span class="n">(${filteredUnlabeled.length})</span></p>
        <p class="unlabeled-note">These entries had no PSN ID in the log — usually a peer that disconnected before OctoSniff could resolve one. Can't be merged into a player's history, shown separately.</p>
        <table>
          <thead><tr><th>Label</th><th>IP Address</th><th>Location</th><th>Times Seen</th></tr></thead>
          <tbody>
            ${filteredUnlabeled.map(u=>{
              const labelInfo = labels.get(u.labelKey) || {label:'', hidden:false};
              const labelCell = admin
                ? `<input class="label-input" data-key="${escapeHtml(u.labelKey)}" value="${escapeHtml(labelInfo.label)}" placeholder="+ label">`
                : `<span class="label-static">${escapeHtml(labelInfo.label)||'—'}</span>`;
              return `
              <tr>
                <td>${labelCell}</td>
                <td>${ipCell(u.ip, u.ids, {hidden: ipHidden.get(u.ip)||false, showEye:true})}</td>
                <td>${locationCell(u.location)}</td>
                <td>${u.count}</td>
              </tr>
            `;}).join('')}
          </tbody>
        </table>
      </section>
    `;
  }

  if(admin){
    document.querySelectorAll('.label-input').forEach(inp=>{
      inp.addEventListener('click', e => e.stopPropagation());
      let lastSaved = inp.value;
      inp.addEventListener('keydown', e=>{ if(e.key === 'Enter') inp.blur(); });
      inp.addEventListener('blur', ()=>{
        const val = inp.value.trim();
        if(val !== lastSaved){
          lastSaved = val;
          saveLabel(inp.dataset.key, val);
        }
      });
    });
  }

  document.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      copyToClipboard(btn.dataset.copy, btn);
    });
  });
  if(admin){
    document.querySelectorAll('.del-btn').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const ids = btn.dataset.ids.split(',').filter(Boolean).map(Number);
        promptDeleteIp(ids, btn.dataset.ip);
      });
    });
    document.querySelectorAll('.eye-btn').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        if(btn.dataset.unameKey !== undefined){
          promptToggleUsernameHidden(btn.dataset.unameKey, btn.dataset.unameDisplay);
        } else if(btn.dataset.ip !== undefined){
          promptToggleIpHidden(btn.dataset.ip);
        }
      });
    });
  }
}

function csvEscape(v){
  v = (v==null?'':String(v));
  if(/[",\n]/.test(v)) return '"' + v.replace(/"/g,'""') + '"';
  return v;
}

function exportFilteredCSV(){
  const q = search.value.trim().toLowerCase();
  const list = users.filter(u => matchesQuery(u, q));
  const filteredUnlabeled = unlabeled.filter(u =>
    !q || u.ip.toLowerCase().includes(q) || u.location.toLowerCase().includes(q)
  );

  if(!list.length && !filteredUnlabeled.length){
    showToast('nothing to export');
    return;
  }

  const lines = [['Label','PSN ID','IP','Location','IP History Count'].map(csvEscape).join(',')];
  list.forEach(u=>{
    const labelVal = (labels.get(u.username.toLowerCase()) || {}).label || '';
    lines.push([labelVal, u.username, u.latestIp, u.latestLocation, u.history.length].map(csvEscape).join(','));
  });
  filteredUnlabeled.forEach(u=>{
    const labelVal = (labels.get(u.labelKey) || {}).label || '';
    lines.push([labelVal, '', u.ip, u.location, u.count].map(csvEscape).join(','));
  });

  const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  a.href = url;
  a.download = `peer-log-filtered-${stamp}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('exported CSV');
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

search.addEventListener('input', render);
exportBtn.addEventListener('click', exportFilteredCSV);
changePassBtn.addEventListener('click', openChangePassword);

init();
