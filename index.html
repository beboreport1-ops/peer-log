<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Peer Log Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1b2a;
    --panel:#122536;
    --panel-2:#0f2030;
    --line:#1e3547;
    --line-strong:#2b4a63;
    --text:#e6f4ef;
    --text-soft:#b8ccc4;
    --dim:#6d8479;
    --accent:#2dd4a8;         /* mint */
    --accent-glow:#73ffb8;
    --accent-soft:rgba(45,212,168,.12);
    --accent-dim:#1a8f6f;
    --warn:#fbbf24;
    --danger:#f87171;
    --ok:#4ade80;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --display:'Space Grotesk','Inter',sans-serif;
    --mono:'JetBrains Mono','SFMono-Regular','Consolas',monospace;
    --radius:10px;
    --radius-sm:6px;
    --shadow-sm:0 1px 2px rgba(0,0,0,.25);
    --shadow-md:0 8px 30px -12px rgba(0,0,0,.55), 0 1px 2px rgba(0,0,0,.3);
  }
  *{box-sizing:border-box;}
  html,body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 500px at 85% -10%, rgba(45,212,168,.10), transparent 60%),
      radial-gradient(900px 400px at 0% 0%, rgba(115,255,184,.06), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    font-size:14px;
    line-height:1.5;
    min-height:100vh;
    padding:40px 24px 80px;
  }
  .wrap{max-width:1080px;margin:0 auto;}

  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:1px solid var(--line);
    padding-bottom:22px;
    margin-bottom:32px;
    gap:20px;
    flex-wrap:wrap;
  }
  h1{
    font-family:var(--display);
    font-size:26px;
    letter-spacing:-.02em;
    text-transform:none;
    margin:0;
    color:var(--text);
    font-weight:700;
  }
  h1 span{color:var(--accent);font-weight:500;}
  .sub{color:var(--dim);font-size:12px;letter-spacing:.01em;margin-top:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--dim);display:inline-block;transition:.2s;}
  .dot.synced{background:var(--ok);box-shadow:0 0 0 3px rgba(22,101,52,.12);}
  .dot.syncing{background:var(--warn);animation:pulse 1s infinite;}
  .dot.err{background:var(--danger);box-shadow:0 0 0 3px rgba(185,28,28,.12);}
  .dot.warn{background:var(--warn);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  .role-tag{
    font-size:10px;
    letter-spacing:.06em;
    text-transform:uppercase;
    font-weight:600;
    padding:2px 9px;
    border-radius:999px;
    border:1px solid var(--line-strong);
    color:var(--text-soft);
    background:var(--panel);
  }
  .role-tag.admin{color:var(--accent);border-color:var(--accent-dim);background:var(--accent-soft);}
  .logout-link{
    background:none;border:none;color:var(--dim);
    font-family:var(--sans);font-size:12px;font-weight:500;
    text-decoration:underline;text-underline-offset:2px;cursor:pointer;
    padding:0;
  }
  .logout-link:hover{color:var(--accent);}
  .count{
    font-size:11px;
    color:var(--dim);
    letter-spacing:.06em;
    text-transform:uppercase;
    text-align:right;
    font-weight:500;
  }
  .count b{
    color:var(--text);
    font-family:var(--display);
    font-size:28px;
    display:block;
    font-weight:700;
    letter-spacing:-.02em;
    line-height:1.1;
    margin-bottom:2px;
  }

  .dropzone{
    border:1.5px dashed var(--line-strong);
    background:var(--panel);
    border-radius:var(--radius);
    padding:36px 24px;
    text-align:center;
    cursor:pointer;
    transition:border-color .18s, background .18s, transform .18s;
    margin-bottom:24px;
    display:block;
  }
  .dropzone:hover, .dropzone.drag{
    border-color:var(--accent);
    background:var(--panel-2);
  }
  .dropzone.drag{transform:scale(1.005);}
  .dropzone p{margin:0;color:var(--dim);font-size:12.5px;line-height:1.6;}
  .dropzone p.main{color:var(--text);font-size:15px;font-weight:500;margin-bottom:8px;font-family:var(--display);}
  .dropzone .accent{color:var(--accent);font-weight:600;}
  input[type=file]{display:none;}

  .toolbar{
    display:flex;
    gap:10px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .search{
    flex:1;
    min-width:200px;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    padding:11px 14px;
    font-family:var(--sans);
    font-size:13px;
    border-radius:var(--radius-sm);
    outline:none;
    transition:.15s;
    box-shadow:var(--shadow-sm);
  }
  .search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .search::placeholder{color:var(--dim);}

  .btn{
    background:var(--panel);
    border:1px solid var(--line-strong);
    color:var(--text-soft);
    padding:10px 16px;
    font-family:var(--sans);
    font-size:12.5px;
    font-weight:500;
    letter-spacing:.01em;
    text-transform:none;
    border-radius:var(--radius-sm);
    cursor:pointer;
    transition:.15s ease;
    white-space:nowrap;
    box-shadow:var(--shadow-sm);
  }
  .btn:hover{border-color:var(--text-soft);color:var(--text);background:var(--panel-2);}
  .btn:active{transform:translateY(1px);}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .btn.primary{
    color:var(--bg);
    background:var(--accent);
    border-color:var(--accent);
    font-weight:600;
  }
  .btn.primary:hover{background:var(--accent-glow);border-color:var(--accent-glow);color:var(--bg);box-shadow:0 0 20px rgba(45,212,168,.35);}
  .btn.danger{color:var(--text-soft);}
  .btn.danger:hover{border-color:var(--danger);color:var(--danger);background:rgba(248,113,113,.12);}
  .btn.warn{color:var(--text-soft);}
  .btn.warn:hover{border-color:var(--warn);color:var(--warn);background:rgba(251,191,36,.12);}
  .btn:disabled{opacity:.45;cursor:default;transform:none;}

  .bulk-bar{
    display:flex;
    align-items:center;
    gap:10px;
    margin:0 0 16px;
    padding:12px 16px;
    background:var(--accent-soft);
    border:1px solid var(--accent-dim);
    border-radius:var(--radius-sm);
    flex-wrap:wrap;
  }
  .bulk-bar .count{color:var(--accent);font-size:12.5px;font-weight:600;letter-spacing:0;text-transform:none;margin-right:auto;}
  .bulk-bar .count b{display:inline;font-size:inherit;font-family:inherit;}
  .checkbox-col{width:34px;}
  .row-check{
    width:15px;height:15px;cursor:pointer;accent-color:var(--accent);
    vertical-align:middle;
  }

  section.block{margin-bottom:36px;}
  .block-title{
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    font-weight:600;
    color:var(--dim);
    margin:0 0 12px 2px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .block-title .n{
    color:var(--accent);
    font-family:var(--display);
    font-size:12px;
  }

  table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    font-size:13px;
    box-shadow:var(--shadow-md);
  }
  thead th{
    text-align:left;
    padding:12px 16px;
    color:var(--dim);
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    font-size:10.5px;
    border-bottom:1px solid var(--line);
    background:var(--panel-2);
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
    transition:color .12s;
  }
  thead th:hover{color:var(--text);}
  thead th.sorted{color:var(--accent);}
  thead th .arrow{opacity:.7;margin-left:4px;font-size:9px;}
  tbody td{
    padding:11px 16px;
    border-bottom:1px solid var(--line);
    color:var(--text);
    vertical-align:middle;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr.main-row{cursor:pointer;transition:background .12s;}
  tbody tr.main-row.row-even{background:transparent;}
  tbody tr.main-row.row-even:hover,
  tbody tr.main-row.row-odd:hover{background:var(--panel-2);}
  tbody tr.main-row:hover td:nth-child(3){color:var(--accent);}

  .ip{color:var(--text-soft);font-family:var(--mono);font-size:12.5px;}
  .last-seen{color:var(--dim);font-size:11.5px;white-space:nowrap;}
  .label-input{
    width:100%;
    min-width:80px;
    background:transparent;
    border:1px solid transparent;
    color:var(--text);
    font-family:var(--sans);
    font-size:13px;
    padding:6px 9px;
    border-radius:var(--radius-sm);
    outline:none;
    transition:.12s;
  }
  .label-input::placeholder{color:var(--dim);opacity:.6;}
  .label-input:hover{border-color:var(--line-strong);background:var(--panel-2);}
  .label-input:focus{border-color:var(--accent);background:var(--panel);box-shadow:0 0 0 3px var(--accent-soft);}
  .label-static{color:var(--dim);font-size:12.5px;padding:6px 9px;display:block;}

  .ip-cell{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}

  /* ---------- unified inline "chip" buttons ---------- */
  .icon-btn{ }
  .chip-btn{
    display:inline-flex;
    align-items:center;
    gap:4px;
    font-family:var(--sans);
    font-size:11px;
    font-weight:500;
    letter-spacing:0;
    line-height:1.3;
    color:var(--dim);
    background:var(--panel-2);
    border:1px solid var(--line);
    padding:4px 10px;
    border-radius:999px;
    cursor:pointer;
    white-space:nowrap;
    transition:.12s ease;
    margin-left:6px;
  }
  .ip-cell .chip-btn{margin-left:0;}
  .chip-btn:hover{border-color:var(--text-soft);color:var(--text);background:var(--panel);}
  .chip-btn:active{transform:scale(.96);}
  .chip-btn.chip-icon{padding:4px 8px;}
  .chip-btn.chip-ghost{background:transparent;border-style:dashed;}
  .chip-btn.chip-ghost:hover{border-style:solid;background:var(--panel-2);}
  .chip-btn.chip-accent{color:var(--accent);border-color:var(--accent-dim);background:var(--accent-soft);}
  .chip-btn.chip-accent:hover{background:rgba(45,212,168,.2);color:var(--accent-glow);border-color:var(--accent);}
  .chip-btn.chip-warn:hover{color:var(--warn);border-color:var(--warn);background:rgba(251,191,36,.12);}
  .chip-btn.chip-danger:hover{color:var(--danger);border-color:var(--danger);background:rgba(248,113,113,.12);}
  .chip-btn.copied{color:var(--ok);border-color:var(--ok);background:rgba(74,222,128,.14);}

  tr.unlabeled-row{cursor:pointer;}
  tr.unlabeled-row:hover td{background:var(--panel-2);}
  .caret{display:inline-block;transition:transform .15s;margin-right:8px;color:var(--dim);}
  tr.expanded .caret{transform:rotate(90deg);color:var(--accent);}

  tr.hist-row td{
    padding:8px 16px 8px 42px;
    font-size:12px;
    color:var(--dim);
    border-bottom:1px solid var(--line);
    background:#0d1c2b;
  }
  tr.hist-row.row-even td{background:#0d1c2b;}
  tr.hist-row.row-odd td{background:#0b1826;}
  tr.hist-row td.ip{color:var(--text-soft);}
  tr.hist-row.newest td{color:var(--text);}
  .hist-tag{
    font-size:9.5px;
    font-weight:600;
    color:var(--bg);
    background:var(--accent);
    padding:2px 7px;
    border-radius:999px;
    margin-left:8px;
    letter-spacing:.05em;
    text-transform:uppercase;
    font-family:var(--sans);
  }

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--dim);
    font-size:13px;
    border:1px dashed var(--line-strong);
    background:var(--panel);
    border-radius:var(--radius);
  }
  .empty .accent{color:var(--accent);font-weight:600;}

  .unlabeled-note{
    font-size:12px;
    color:var(--dim);
    margin:0 0 10px 2px;
    line-height:1.6;
  }
  .warn{color:var(--warn);font-weight:500;}

  .unlabeled-table tbody tr:nth-child(even) td{background:var(--panel-2);}
  .unlabeled-table tbody tr:hover td{background:#16283a;}

  .toast{
    position:fixed;
    bottom:28px;
    left:50%;
    transform:translateX(-50%) translateY(0);
    background:var(--panel);
    border:1px solid var(--accent);
    color:var(--accent-glow);
    padding:11px 20px;
    border-radius:999px;
    font-size:12.5px;
    font-weight:500;
    letter-spacing:.01em;
    opacity:0;
    pointer-events:none;
    transition:opacity .18s, transform .18s;
    max-width:80vw;
    text-align:center;
    z-index:200;
    box-shadow:0 10px 30px -10px rgba(28,26,23,.4);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-8px);}
  .toast.err{background:var(--danger);border-color:var(--danger);color:var(--bg);}

  footer{
    margin-top:40px;
    text-align:center;
    color:var(--dim);
    font-size:10.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-weight:500;
  }

  /* ---- gate screen ---- */
  .gate-screen{
    min-height:80vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .gate-box{
    width:100%;
    max-width:360px;
    text-align:center;
    background:var(--panel);
    padding:36px 30px;
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow-md);
  }
  .gate-title{
    font-family:var(--display);
    font-size:24px;
    letter-spacing:-.02em;
    text-transform:none;
    margin:0 0 6px;
    font-weight:700;
  }
  .gate-title span{color:var(--accent);font-weight:500;}
  .gate-sub{color:var(--dim);font-size:12.5px;margin:0 0 22px;}
  .gate-tabs{
    display:flex;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    overflow:hidden;
    margin-bottom:20px;
    padding:3px;
    gap:3px;
  }
  .gate-tab{
    flex:1;
    background:transparent;
    border:none;
    color:var(--dim);
    padding:9px 0;
    font-family:var(--sans);
    font-size:12px;
    font-weight:500;
    letter-spacing:.02em;
    text-transform:none;
    cursor:pointer;
    border-radius:4px;
    transition:.15s;
  }
  .gate-tab:hover{color:var(--text);}
  .gate-tab.active{color:var(--text);background:var(--panel);box-shadow:var(--shadow-sm);}
  .gate-input{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line-strong);
    color:var(--text);
    padding:12px 14px;
    font-family:var(--sans);
    font-size:14px;
    border-radius:var(--radius-sm);
    outline:none;
    margin-bottom:10px;
    transition:.15s;
  }
  .gate-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .gate-error{color:var(--danger);font-size:11.5px;margin:0 0 10px;min-height:14px;}
  .gate-submit{width:100%;padding:12px;}

  /* ---- modal ---- */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(28,26,23,.5);
    backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-box{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:26px;
    width:100%;
    max-width:360px;
    box-shadow:0 20px 60px -20px rgba(28,26,23,.4);
  }
  .modal-box h3{
    margin:0 0 16px;
    font-family:var(--display);
    font-size:17px;
    letter-spacing:-.01em;
    text-transform:none;
    color:var(--text);
    font-weight:700;
  }
  .modal-label{
    display:block;
    font-size:12px;
    color:var(--text-soft);
    letter-spacing:0;
    margin-bottom:14px;
    font-weight:500;
  }
  .modal-input{
    display:block;
    width:100%;
    margin-top:8px;
    background:var(--panel);
    border:1px solid var(--line-strong);
    color:var(--text);
    padding:10px 12px;
    font-family:var(--sans);
    font-size:13.5px;
    border-radius:var(--radius-sm);
    outline:none;
    transition:.15s;
  }
  .modal-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .modal-error{color:var(--danger);font-size:11.5px;margin:0 0 12px;display:none;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;}

  @media (max-width:520px){
    body{padding:24px 16px 60px;}
    h1{font-size:22px;}
    .count b{font-size:22px;}
    thead th:nth-child(5), tbody td:nth-child(5),
    thead th:nth-child(6), tbody td:nth-child(6){display:none;}
    .label-input{min-width:50px;font-size:12px;}
    table{font-size:12.5px;}
    thead th, tbody td{padding:9px 12px;}
  }
</style>
</head>
<body>

<div id="gateScreen"></div>

<div class="wrap" id="app" style="display:none;">

  <header>
    <div>
      <h1>PEER<span>_</span>LOG</h1>
      <div class="sub">
        <span class="dot" id="syncDot"></span><span id="syncLabel">connecting...</span>
        <span class="role-tag" id="roleTag"></span>
        <button class="logout-link" id="logoutBtn">log out</button>
      </div>
    </div>
    <div class="count" id="count"><b>0</b>players loaded</div>
  </header>

  <label class="dropzone" id="dropzone" style="display:none;">
    <input type="file" id="fileInput" accept=".csv" multiple>
    <p class="main">Drop <span class="accent">.csv</span> file(s) here, or click to browse</p>
    <p>expects columns: PSN ID (username/player), IP, location — synced to the cloud; if you're offline it queues and syncs automatically once you're back online</p>
  </label>

  <button class="btn" id="addRowBtn" style="display:none;margin-bottom:14px;">+ Add row manually</button>

  <div class="toolbar" id="toolbar" style="display:none;">
    <input class="search" id="search" placeholder="filter by PSN ID, ip, or location...">
    <button class="btn primary" id="exportBtn">Export filtered CSV</button>
    <button class="btn" id="changePassBtn" style="display:none;">Change Password</button>
  </div>

  <div class="bulk-bar" id="bulkBar" style="display:none;">
    <span class="count" id="bulkCount">0 selected</span>
    <button class="btn" id="bulkExportBtn">Export Selected</button>
    <button class="btn warn" id="bulkHideBtn" style="display:none;">Hide Selected</button>
    <button class="btn" id="bulkUnhideBtn" style="display:none;">Unhide Selected</button>
    <button class="btn danger" id="bulkDeleteBtn" style="display:none;">Delete Selected</button>
    <button class="btn" id="bulkClearBtn">Clear</button>
  </div>

  <div id="mainHolder"></div>
  <div id="unlabeledHolder"></div>

  <footer>-- end of log --</footer>
</div>

<div class="toast" id="toast">copied</div>

<script>
// ---- Supabase config (public/publishable key — safe to expose client-side,
// actual access is restricted by RLS policies + the password/key gate below) ----
const SUPABASE_URL = 'https://kimgthhwggzudpdediga.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3vpCzgVNaI1LDQstLz9_dw_Lv8jCRnf';

let rawRows = [];
let users = [];
let unlabeled = [];
let sortKey = 'username';
let sortDir = 1;
let expanded = new Set();
let labels = new Map();    // username_key -> {label, hidden}
let ipHidden = new Map();  // ip -> boolean
let selected = new Set();  // composite keys of selected rows (users + unlabeled)
let passwordHash = null;
let keyHash = null;
let role = null;           // 'view' | 'admin'

const appEl = document.getElementById('app');
const gateScreenEl = document.getElementById('gateScreen');
const dropzone = document.getElementById('dropzone');
const addRowBtn = document.getElementById('addRowBtn');
const fileInput = document.getElementById('fileInput');
const toolbar = document.getElementById('toolbar');
const search = document.getElementById('search');
const mainHolder = document.getElementById('mainHolder');
const unlabeledHolder = document.getElementById('unlabeledHolder');
const countEl = document.getElementById('count');
const exportBtn = document.getElementById('exportBtn');
const changePassBtn = document.getElementById('changePassBtn');
const bulkBar = document.getElementById('bulkBar');
const bulkCount = document.getElementById('bulkCount');
const bulkExportBtn = document.getElementById('bulkExportBtn');
const bulkHideBtn = document.getElementById('bulkHideBtn');
const bulkUnhideBtn = document.getElementById('bulkUnhideBtn');
const bulkDeleteBtn = document.getElementById('bulkDeleteBtn');

// ---------- offline upload queue ----------
// New CSV rows are queued in localStorage first, then we try to push them to
// Supabase right away. If that fails (no connection), they stay queued and
// get retried automatically when the browser comes back online.
const PENDING_KEY = 'peerlog_pending_uploads';
function getPendingRows(){
  try{ return JSON.parse(localStorage.getItem(PENDING_KEY) || '[]'); }
  catch(e){ return []; }
}
function setPendingRows(rows){
  try{ localStorage.setItem(PENDING_KEY, JSON.stringify(rows)); }catch(e){ console.error(e); }
}
function updateSyncIndicator(){
  const n = getPendingRows().length;
  if(n > 0){
    setSyncStatus('warn', `${n} row${n>1?'s':''} queued — waiting for connection`);
  } else if(navigator.onLine === false){
    setSyncStatus('warn', 'offline');
  } else {
    setSyncStatus('synced', 'synced');
  }
}
let flushInFlight = false;
async function flushPendingUploads(){
  if(flushInFlight) return;
  const pending = getPendingRows();
  if(!pending.length) return;
  if(navigator.onLine === false){ updateSyncIndicator(); return; }
  flushInFlight = true;
  setSyncStatus('syncing', `syncing ${pending.length} queued row${pending.length>1?'s':''}...`);
  try{
    await insertRows(pending);
    setPendingRows([]);
    await refreshFromCloud();
    showToast(`synced ${pending.length} queued row${pending.length>1?'s':''}`);
  }catch(e){
    console.error(e);
    updateSyncIndicator();
  }
  flushInFlight = false;
}
window.addEventListener('online', flushPendingUploads);
window.addEventListener('offline', updateSyncIndicator);
setInterval(flushPendingUploads, 15000);

// ---------- hashing ----------
async function sha256Hex(str){
  const enc = new TextEncoder().encode(str || '');
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}

// ---------- Supabase REST helpers ----------
async function sbFetch(path, options={}){
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      ...(options.headers||{})
    }
  });
  if(!res.ok){
    const text = await res.text().catch(()=> '');
    throw new Error(text || res.statusText || 'request failed');
  }
  if(res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ---------- generic modal ----------
function openModal({title, fields=[], submitLabel='Confirm', danger=false, onSubmit}){
  return new Promise((resolve)=>{
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <h3>${title}</h3>
        <div class="modal-fields">
          ${fields.map(f=>`<label class="modal-label">${f.label}<input class="modal-input" type="${f.type||'text'}" data-field="${f.id}" value="${f.value?escapeHtml(f.value):''}" autocomplete="off"></label>`).join('')}
        </div>
        <p class="modal-error"></p>
        <div class="modal-actions">
          <button class="btn modal-cancel">Cancel</button>
          <button class="btn ${danger?'danger':'primary'} modal-submit">${submitLabel}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const errorEl = overlay.querySelector('.modal-error');
    const submitBtn = overlay.querySelector('.modal-submit');
    const cancelBtn = overlay.querySelector('.modal-cancel');
    const inputs = [...overlay.querySelectorAll('.modal-input')];
    if(inputs[0]) setTimeout(()=>{ inputs[0].focus(); inputs[0].select(); }, 30);

    function close(result){ overlay.remove(); resolve(result); }
    function collect(){
      const vals = {};
      inputs.forEach(inp => vals[inp.dataset.field] = inp.value);
      return vals;
    }
    async function doSubmit(){
      submitBtn.disabled = true;
      const prevLabel = submitBtn.textContent;
      submitBtn.textContent = '...';
      try{
        const result = await onSubmit(collect());
        if(result && result.ok){
          close(true);
          return;
        }
        errorEl.textContent = (result && result.message) || 'Failed';
        errorEl.style.display = 'block';
      }catch(e){
        errorEl.textContent = e.message || 'Error';
        errorEl.style.display = 'block';
      }
      submitBtn.disabled = false;
      submitBtn.textContent = prevLabel;
    }
    cancelBtn.addEventListener('click', ()=>close(false));
    overlay.addEventListener('click', e=>{ if(e.target===overlay) close(false); });
    submitBtn.addEventListener('click', doSubmit);
    inputs.forEach(inp => inp.addEventListener('keydown', e=>{ if(e.key==='Enter') doSubmit(); }));
  });
}
// Admin actions are already gated by the key at login, so admin-only prompts
// are plain confirmations — no repeated credential entry.
function confirmModal({title, submitLabel='Confirm', danger=true, onConfirm}){
  return openModal({
    title, fields:[], submitLabel, danger,
    onSubmit: async () => {
      try{
        await onConfirm();
        return {ok:true};
      }catch(e){
        return {ok:false, message: e.message || 'Action failed — check connection'};
      }
    }
  });
}

// ---------- init / auth ----------
async function init(){
  setSyncStatus('syncing', 'connecting...');
  try{
    const rows = await sbFetch('peer_log_auth?select=*&id=eq.1');
    const row = rows && rows[0];
    if(!row) throw new Error('auth not configured');
    passwordHash = row.password_hash;
    keyHash = row.key_hash;
  }catch(e){
    console.error(e);
    gateScreenEl.innerHTML = `<div class="gate-screen"><div class="gate-box"><p class="gate-error" style="display:block;">Couldn't reach the log. Check your connection and reload the page.</p></div></div>`;
    setSyncStatus('err', 'connection failed');
    return;
  }

  const savedRole = sessionStorage.getItem('peerlog_role');
  if(savedRole === 'view' || savedRole === 'admin'){
    role = savedRole;
    showApp();
  } else {
    showGate();
  }
  setSyncStatus('synced', 'synced');
}

function showGate(){
  appEl.style.display = 'none';
  let tab = 'view';

  function draw(){
    gateScreenEl.innerHTML = `
      <div class="gate-screen">
        <div class="gate-box">
          <h1 class="gate-title">PEER<span>_</span>LOG</h1>
          <p class="gate-sub">${tab==='view' ? 'Enter password to view the log' : 'Enter key for admin access'}</p>
          <div class="gate-tabs">
            <button class="gate-tab ${tab==='view'?'active':''}" data-tab="view">Viewer</button>
            <button class="gate-tab ${tab==='admin'?'active':''}" data-tab="admin">Admin</button>
          </div>
          <input class="gate-input" id="gateInput" type="password" placeholder="${tab==='view'?'password':'key'}" autocomplete="off">
          <p class="gate-error" id="gateError"></p>
          <button class="btn primary gate-submit" id="gateSubmit">${tab==='view'?'Unlock':'Log in as admin'}</button>
        </div>
      </div>`;

    gateScreenEl.querySelectorAll('.gate-tab').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tab = btn.dataset.tab;
        draw();
      });
    });

    const input = document.getElementById('gateInput');
    const err = document.getElementById('gateError');
    const submit = document.getElementById('gateSubmit');
    setTimeout(()=>input.focus(), 30);

    async function tryLogin(){
      submit.disabled = true;
      const hash = await sha256Hex(input.value);
      const expected = tab === 'view' ? passwordHash : keyHash;
      if(hash === expected){
        role = tab;
        sessionStorage.setItem('peerlog_role', role);
        gateScreenEl.innerHTML = '';
        showApp();
      } else {
        err.textContent = tab==='view' ? 'Incorrect password' : 'Incorrect key';
        submit.disabled = false;
      }
    }
    submit.addEventListener('click', tryLogin);
    input.addEventListener('keydown', e => { if(e.key==='Enter') tryLogin(); });
  }
  draw();
}

async function showApp(){
  gateScreenEl.innerHTML = '';
  appEl.style.display = 'block';
  roleTag.textContent = isAdmin() ? 'admin' : 'viewer';
  roleTag.className = 'role-tag' + (isAdmin() ? ' admin' : '');
  dropzone.style.display = isAdmin() ? 'block' : 'none';
  addRowBtn.style.display = isAdmin() ? 'inline-block' : 'none';
  changePassBtn.style.display = isAdmin() ? 'inline-block' : 'none';

  if(isAdmin() && getPendingRows().length){
    await flushPendingUploads();
  }
  if(getPendingRows().length){
    // still queued (offline) — show current cloud data anyway, then restore the queue indicator
    await refreshFromCloud();
    updateSyncIndicator();
  } else {
    await refreshFromCloud();
  }
}

async function openChangePassword(){
  await openModal({
    title: 'Change viewer password',
    fields: [
      {id:'newpass', label:'New password', type:'password'},
      {id:'confirm', label:'Confirm new password', type:'password'}
    ],
    submitLabel: 'Save',
    onSubmit: async (vals) => {
      if(!vals.newpass) return {ok:false, message:'Enter a new password'};
      if(vals.newpass !== vals.confirm) return {ok:false, message:"Passwords don't match"};
      try{
        const newHash = await sha256Hex(vals.newpass);
        await patchAuth({password_hash:newHash});
        passwordHash = newHash;
        showToast('password changed');
        return {ok:true};
      }catch(e){
        return {ok:false, message:'Update failed — check connection'};
      }
    }
  });
}

// ---------- data loading ----------
async function refreshFromCloud(){
  setSyncStatus('syncing', 'syncing...');
  try{
    const [data, labelData, ipHiddenData] = await Promise.all([loadAllRows(), loadLabels(), loadIpHidden()]);
    rawRows = (data||[]).map(r => ({username:r.username||'', ip:r.ip||'', location:r.location||'', idx:r.id, addedAt:r.created_at||''}));
    labels = new Map((labelData||[]).map(l => [l.username_key, {label:l.label||'', hidden:!!l.hidden}]));
    ipHidden = new Map((ipHiddenData||[]).map(r => [r.ip, !!r.hidden]));
    buildGroups();
    toolbar.style.display = 'flex';
    render();
    setSyncStatus('synced', 'synced');
  }catch(e){
    console.error(e);
    setSyncStatus('err', 'sync failed — check connection');
  }
}

function normKey(k){
  const s = k.trim().toLowerCase();
  if(s.includes('user') || s.includes('player') || s.includes('name') || s.includes('gamertag') || s.includes('tag')) return 'username';
  if(s.includes('ip')) return 'ip';
  if(s.includes('city')) return 'city';
  if(s.includes('country')) return 'country';
  if(s.includes('loc')) return 'location';
  return s;
}

function parseFile(file){
  return new Promise(resolve=>{
    Papa.parse(file, {
      header:true,
      skipEmptyLines:true,
      complete: res => {
        const fieldMap = {};
        res.meta.fields.forEach(f => fieldMap[f] = normKey(f));
        const parsed = res.data.map(r => {
          const out = {username:'', ip:'', location:'', city:'', country:''};
          Object.keys(r).forEach(k=>{
            const nk = fieldMap[k];
            const val = (r[k]||'').toString().trim();
            if(nk === 'username' || nk === 'ip' || nk === 'location' || nk === 'city' || nk === 'country'){
              out[nk] = val;
            }
          });
          // Some exports (party-chat) give one combined "location" column.
          // Others (traffic export) give separate City/Country columns —
          // stitch those into the same "City, Country" shape either way.
          if(!out.location){
            out.location = (out.city && out.country) ? `${out.city}, ${out.country}` : (out.city || out.country || '');
          }
          delete out.city;
          delete out.country;
          return out;
        }).filter(r => r.username || r.ip || r.location);
        resolve(parsed);
      },
      error: () => resolve([])
    });
  });
}

async function handleFiles(files){
  if(!isAdmin()) return;
  setSyncStatus('syncing', 'reading file(s)...');
  const results = await Promise.all(files.map(parseFile));
  const allNewRows = results.flat().map(r => ({username:r.username, ip:r.ip, location:r.location}));
  if(!allNewRows.length){
    updateSyncIndicator();
    return;
  }
  const pending = getPendingRows();
  pending.push(...allNewRows);
  setPendingRows(pending);
  showToast(`queued ${allNewRows.length} row${allNewRows.length>1?'s':''}`);
  await flushPendingUploads();
}

async function openAddRowManual(){

  await openModal({

    }
  });
}

function buildGroups(){
  const map = new Map();
  const unlabeledMap = new Map();

  rawRows.forEach(r => {
    if(r.username){
      const key = r.username.toLowerCase();
      if(!map.has(key)) map.set(key, {username:r.username, ipMap:new Map()});
      const g = map.get(key);
      g.username = r.username;
      const existing = g.ipMap.get(r.ip);
      if(existing){
        existing.location = r.location;
        existing.idx = r.idx;
        existing.addedAt = r.addedAt;
        existing.ids.push(r.idx);
      } else {
        g.ipMap.set(r.ip, {location:r.location, idx:r.idx, addedAt:r.addedAt, ids:[r.idx]});
      }
    } else if(r.ip || r.location){
      const key = r.ip + '|' + r.location;
      if(!unlabeledMap.has(key)) unlabeledMap.set(key, {ip:r.ip, location:r.location, count:0, lastIdx:r.idx, addedAt:r.addedAt, ids:[], labelKey:'unlabeled::'+key});
      const u = unlabeledMap.get(key);
      u.count++;
      u.ids.push(r.idx);
      u.lastIdx = Math.max(u.lastIdx, r.idx);
      u.addedAt = r.addedAt;
    }
  });

  users = [...map.values()].map(g => {
    const history = [...g.ipMap.entries()].map(([ip, v]) => ({ip, location:v.location, idx:v.idx, addedAt:v.addedAt, ids:v.ids}));
    history.sort((a,b) => b.idx - a.idx);
    return {
      username: g.username,
      latestIp: history[0].ip,
      latestLocation: history[0].location,
      latestAddedAt: history[0].addedAt,
      history
    };
  });

  unlabeled = [...unlabeledMap.values()].sort((a,b) => b.lastIdx - a.lastIdx);
}

function matchesQuery(u, q){
  if(!q) return true;
  if(u.username.toLowerCase().includes(q)) return true;
  return u.history.some(h => h.ip.toLowerCase().includes(q) || h.location.toLowerCase().includes(q));
}

function unlabeledSelKey(u){ return u.labelKey; }

}
function getSelectedUnlabeledObjs(){

function buildCsvLines(userList, unlabeledList){
  const lines = [['Label','PSN ID','IP','Location','IP History Count','Last Seen'].map(csvEscape).join(',')];
  userList.forEach(u=>{
    const labelVal = (labels.get(u.username.toLowerCase()) || {}).label || '';
    lines.push([labelVal, u.username, u.latestIp, u.latestLocation, u.history.length, u.latestAddedAt||''].map(csvEscape).join(','));
  });
  unlabeledList.forEach(u=>{
    const labelVal = (labels.get(u.labelKey) || {}).label || '';
    lines.push([labelVal, '', u.ip, u.location, u.count, u.addedAt||''].map(csvEscape).join(','));
  });
  return lines;
}

function downloadCsvLines(lines, filenamePrefix){
  const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  a.href = url;
  a.download = `${filenamePrefix}-${stamp}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportSelectedCSV(){
  const selUsers = getSelectedUserObjs();
  const selUnlabeled = getSelectedUnlabeledObjs();
  if(!selUsers.length && !selUnlabeled.length){
    showToast('nothing selected');
    return;
  }
  downloadCsvLines(buildCsvLines(selUsers, selUnlabeled), 'peer-log-selected');
  showToast(`exported ${selUsers.length + selUnlabeled.length} selected row${(selUsers.length+selUnlabeled.length)>1?'s':''}`);
}

async function bulkDeleteSelected(){
  if(!isAdmin()) return;
  const selUsers = getSelectedUserObjs();
  const selUnlabeled = getSelectedUnlabeledObjs();
  const total = selUsers.length + selUnlabeled.length;
  if(!total) return;
  const allIds = [
    ...selUsers.flatMap(u => u.history.flatMap(h => h.ids)),
    ...selUnlabeled.flatMap(u => u.ids)
  ];
  await confirmModal({
    title: `Delete ${total} selected row${total>1?'s':''}? This can't be undone.`,
    submitLabel: 'Delete',
    danger: true,
    onConfirm: async () => {
      await deleteRowsByIds(allIds);
      selected.clear();
      await refreshFromCloud();
      showToast(`deleted ${total} row${total>1?'s':''}`);
    }
  });
}

async function bulkSetHidden(hideFlag){
  if(!isAdmin()) return;
  const selUsers = getSelectedUserObjs();
  const selUnlabeled = getSelectedUnlabeledObjs();
  const total = selUsers.length + selUnlabeled.length;
  if(!total) return;
  const verb = hideFlag ? 'Hide' : 'Unhide';
  await confirmModal({
    title: `${verb} ${total} selected row${total>1?'s':''}?${hideFlag?' (PSN ID + IPs for players, IP for unlabeled entries)':''}`,
    submitLabel: verb,
    danger: hideFlag,
    onConfirm: async () => {
      await Promise.all([
        ...selUsers.map(u=>{
          const key = u.username.toLowerCase();
          const current = labels.get(key) || {label:'', hidden:false};
          labels.set(key, {label:current.label, hidden:hideFlag});
          return saveLabelRemote(key, current.label, hideFlag);
        }),
        ...selUnlabeled.map(u=>{
          ipHidden.set(u.ip, hideFlag);
          return saveIpHiddenRemote(u.ip, hideFlag);
        })
      ]);
      render();
      showToast(`${hideFlag?'hid':'unhid'} ${total} row${total>1?'s':''}`);
    }
  });
}

function copyToClipboard(text, btnEl){
  const done = () => {
    showToast(`copied ${text}`);
    if(btnEl){
      btnEl.classList.add('copied');
      setTimeout(()=>btnEl.classList.remove('copied'), 900);
    }
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, cb){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); cb(); }catch(e){}
  document.body.removeChild(ta);
}
let toastTimer;
function showToast(msg, isErr){
  toast.textContent = msg;
  toast.classList.toggle('err', !!isErr);
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove('show'), 1800);
}

function maskUsername(name){
  if(!name) return name;
  return name.slice(0,2) + '••••';
}
function formatLastSeen(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  if(isNaN(d.getTime())) return '—';
  const short = d.toLocaleString('en-US', {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'});
  return `<span title="${escapeHtml(d.toISOString())}">${escapeHtml(short)}</span>`;
}
function maskIp(ip){
  if(!ip) return ip;
  const parts = ip.split('.');
  if(parts.length === 4){
    return parts.map((p, i) => i===0 ? p : '*'.repeat(p.length)).join('.');
  }
  return '*'.repeat(ip.length);
}

function countryCodeToFlag(code){
  if(!/^[A-Za-z]{2}$/.test(code)) return '';
  const hex = [...code.toUpperCase()].map(c => (127397 + c.charCodeAt(0)).toString(16)).join('-');
  const url = `https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/72x72/${hex}.png`;
  return `<img src="${url}" alt="${code.toUpperCase()}" class="flag-icon" style="width:1.2em;height:1.2em;vertical-align:-0.2em;" loading="lazy">`;
}

const COUNTRY_NAME_TO_CODE = {
  "united states":"US","usa":"US","us":"US","united kingdom":"GB","uk":"GB",
  "peru":"PE","new zealand":"NZ","austria":"AT","puerto rico":"PR",
  "saudi arabia":"SA","canada":"CA","australia":"AU","germany":"DE",
  "france":"FR","spain":"ES","italy":"IT","netherlands":"NL","brazil":"BR",
  "mexico":"MX","japan":"JP","south korea":"KR","china":"CN","india":"IN",
  "russia":"RU","sweden":"SE","norway":"NO","denmark":"DK","finland":"FI",
  "poland":"PL","portugal":"PT","ireland":"IE","belgium":"BE","switzerland":"CH",
  "united arab emirates":"AE","uae":"AE","turkey":"TR","egypt":"EG",
  "south africa":"ZA","argentina":"AR","chile":"CL","colombia":"CO",
  "philippines":"PH","indonesia":"ID","thailand":"TH","vietnam":"VN",
  "malaysia":"MY","singapore":"SG","israel":"IL","greece":"GR","romania":"RO",
  "ukraine":"UA","czech republic":"CZ","hungary":"HU","kuwait":"KW",
  "qatar":"QA","bahrain":"BH","oman":"OM","jordan":"JO","lebanon":"LB",
  "iraq":"IQ","pakistan":"PK","bangladesh":"BD"
};
function countryNameToCode(name){
  if(!name) return '';
  return COUNTRY_NAME_TO_CODE[name.trim().toLowerCase()] || '';
}

function locationCell(location){
  if(!location) return '—';
  const parts = location.split(',');
  const last = parts[parts.length-1].trim();
  const code = /^[A-Za-z]{2}$/.test(last) ? last : countryNameToCode(last);
  const flag = code ? countryCodeToFlag(code) : '';
  return flag ? `${flag} ${escapeHtml(location)}` : escapeHtml(location);
}

async function saveLabel(key, value){
  const current = labels.get(key) || {label:'', hidden:false};
  labels.set(key, {label:value, hidden:current.hidden});
  try{
    await saveLabelRemote(key, value, current.hidden);
  }catch(e){
    console.error(e);
    showToast('label save failed — check connection', true);
  }
}

function ipCell(ip, ids, opts={}){
  const {hidden=false, showEye=false} = opts;
  const safe = escapeHtml(ip);
  const displayValue = hidden ? maskIp(ip) : ip;
  const displaySafe = escapeHtml(displayValue);
  const copySafe = escapeHtml(displayValue);
  const idsAttr = (ids||[]).join(',');
  const copyBtn = ip ? `<button class="icon-btn copy-btn chip-btn chip-icon" data-copy="${copySafe}" title="copy IP">⧉</button>` : '';
  const delBtn = (isAdmin() && ids && ids.length) ? `<button class="icon-btn del-btn chip-btn chip-icon chip-danger" data-ids="${idsAttr}" data-ip="${safe}" title="delete this IP">🗑</button>` : '';
  const eyeBtn = (isAdmin() && showEye && ip) ? `<button class="icon-btn eye-btn chip-btn chip-warn" data-ip="${safe}" title="${hidden?'unhide':'hide'} this IP">${hidden?'Unhide':'Hide'}</button>` : '';
  return `<span class="ip-cell"><span class="ip">${displaySafe||'—'}</span>${copyBtn}${eyeBtn}${delBtn}</span>`;
}

function render(){
  const q = search.value.trim().toLowerCase();
  const admin = isAdmin();

  let list = users.filter(u => matchesQuery(u, q));
  list.sort((a,b)=>{
    let va, vb;
    if(sortKey==='ip'){ va=a.latestIp.toLowerCase(); vb=b.latestIp.toLowerCase(); }
    else if(sortKey==='location'){ va=a.latestLocation.toLowerCase(); vb=b.latestLocation.toLowerCase(); }
    else if(sortKey==='lastSeen'){ va=a.latestAddedAt||''; vb=b.latestAddedAt||''; }
    else { va=a.username.toLowerCase(); vb=b.username.toLowerCase(); }
    if(va<vb) return -1*sortDir;
    if(va>vb) return 1*sortDir;
    return 0;
  });

  countEl.innerHTML = `<b>${list.length}</b>players${q?` (of ${users.length})`:''}`;

  if(!users.length && !unlabeled.length){
    mainHolder.innerHTML = '';
    unlabeledHolder.innerHTML = '';
    return;
  }

  if(!list.length){
    mainHolder.innerHTML = `<div class="empty">No matches for <span class="accent">"${q}"</span></div>`;
  } else {
    const arrow = key => sortKey===key ? `<span class="arrow">${sortDir>0?'▲':'▼'}</span>` : '';
    const th = (key,label) => `<th class="${sortKey===key?'sorted':''}" data-key="${key}">${label}${arrow(key)}</th>`;

    let rowsHtml = '';
    list.forEach((u, uIdx) => {
      const key = u.username.toLowerCase();
      const isExpanded = expanded.has(key);
      const multi = u.history.length > 1;
      const parity = uIdx % 2 === 0 ? 'row-even' : 'row-odd';
      const labelInfo = labels.get(key) || {label:'', hidden:false};
      const nameHidden = labelInfo.hidden;
      const displayName = escapeHtml(nameHidden ? maskUsername(u.username) : u.username);
      const labelCell = admin
        ? `<input class="label-input" data-key="${escapeHtml(key)}" value="${escapeHtml(labelInfo.label)}" placeholder="+ label">`
        : `<span class="label-static">${escapeHtml(labelInfo.label)||'—'}</span>`;
      const nameEye = admin
        ? `<button class="icon-btn eye-btn chip-btn chip-warn" data-uname-key="${escapeHtml(key)}" data-uname-display="${escapeHtml(u.username)}" title="${nameHidden?'unhide':'hide'} this row (PSN ID + IPs)">${nameHidden?'Unhide':'Hide'}</button>`
        : '';
      const allHistIds = u.history.flatMap(h=>h.ids);
      const nameEdit = admin
        ? `<button class="icon-btn edit-psn-btn chip-btn chip-icon" data-ids="${allHistIds.join(',')}" data-uname="${escapeHtml(u.username)}" title="edit PSN ID">✎</button>`
        : '';
      const uSelKey = userSelKey(u);
      const rowChecked = selected.has(uSelKey) ? 'checked' : '';
      rowsHtml += `
        <tr class="main-row ${parity} ${isExpanded?'expanded':''}" data-key="${escapeHtml(key)}">
          <td class="checkbox-col"><input type="checkbox" class="row-check" data-sel-key="${escapeHtml(uSelKey)}" ${rowChecked}></td>
          <td>${labelCell}</td>
          <td><span class="caret">${multi?'▸':''}</span>${displayName}${nameEye}${nameEdit}</td>
          <td>${ipCell(u.latestIp, u.history[0].ids, {hidden:nameHidden, showEye:false})}</td>
          <td>${locationCell(u.latestLocation)}
            ${multi?`<span class="badge chip-btn chip-accent" data-key="${escapeHtml(key)}">+${u.history.length-1} more</span>`:''}
          </td>
          <td class="last-seen">${formatLastSeen(u.latestAddedAt)}</td>
        </tr>`;
      if(isExpanded){
        u.history.forEach((h, i) => {
          rowsHtml += `
            <tr class="hist-row ${parity} ${i===0?'newest':''}">
              <td></td>
              <td></td>
              <td></td>
              <td>${ipCell(h.ip, h.ids, {hidden:nameHidden, showEye:false})}</td>
              <td>${locationCell(h.location)}${i===0?'<span class="hist-tag">latest</span>':''}</td>
              <td class="last-seen">${formatLastSeen(h.addedAt)}</td>
            </tr>`;
        });
      }
    });

    const allUserSelKeys = list.map(userSelKey);
    const allUsersChecked = allUserSelKeys.length>0 && allUserSelKeys.every(k=>selected.has(k));

    mainHolder.innerHTML = `
      <table>
        <thead><tr>
          <th class="checkbox-col"><input type="checkbox" id="selectAllUsers" ${allUsersChecked?'checked':''}></th>
          <th>Label</th>
          ${th('username','PSN ID')}
          ${th('ip','Latest IP')}
          ${th('location','Latest Location')}
          ${th('lastSeen','Last Seen')}
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    `;

    document.getElementById('selectAllUsers').addEventListener('click', e=>{
      e.stopPropagation();
      if(e.target.checked) allUserSelKeys.forEach(k=>selected.add(k));
      else allUserSelKeys.forEach(k=>selected.delete(k));
      render();
    });

    mainHolder.querySelectorAll('.row-check').forEach(cb=>{
      cb.addEventListener('click', e => e.stopPropagation());
      cb.addEventListener('change', e=>{
        const k = cb.dataset.selKey;
        if(cb.checked) selected.add(k); else selected.delete(k);
        renderBulkBar();
        const sa = document.getElementById('selectAllUsers');
        if(sa) sa.checked = allUserSelKeys.every(kk=>selected.has(kk));
      });
    });

    mainHolder.querySelectorAll('thead th').forEach(th=>{
      th.addEventListener('click', ()=>{
        const key = th.dataset.key;
        if(!key) return;
        if(sortKey === key) sortDir *= -1;
        else { sortKey = key; sortDir = 1; }
        render();
      });
    });

    mainHolder.querySelectorAll('.main-row').forEach(tr=>{
      tr.addEventListener('click', (e)=>{
        if(e.target.closest('.badge') || e.target.closest('.icon-btn') || e.target.closest('.label-input') || e.target.closest('.row-check')) return;
        const key = tr.dataset.key;
        if(expanded.has(key)) expanded.delete(key);
        else expanded.add(key);
        render();
      });
    });
    mainHolder.querySelectorAll('.badge').forEach(b=>{
      b.addEventListener('click', (e)=>{
        e.stopPropagation();
        const key = b.dataset.key;
        if(expanded.has(key)) expanded.delete(key);
        else expanded.add(key);
        render();
      });
    });
  }

  const filteredUnlabeled = unlabeled.filter(u =>
    !q || u.ip.toLowerCase().includes(q) || u.location.toLowerCase().includes(q)
  );

  if(!filteredUnlabeled.length){
    unlabeledHolder.innerHTML = '';
  } else {
    const allUnlabeledSelKeys = filteredUnlabeled.map(unlabeledSelKey);
    const allUnlabeledChecked = allUnlabeledSelKeys.length>0 && allUnlabeledSelKeys.every(k=>selected.has(k));

    unlabeledHolder.innerHTML = `
      <section class="block">
        <p class="block-title"><span class="warn">⚠</span> No PSN ID <span class="n">(${filteredUnlabeled.length})</span></p>
        <table class="unlabeled-table">
          <thead><tr>
            <th class="checkbox-col"><input type="checkbox" id="selectAllUnlabeled" ${allUnlabeledChecked?'checked':''}></th>
            <th>Label</th><th>IP Address</th><th>Location</th><th>Times Seen</th><th>Last Seen</th>
          </tr></thead>
          <tbody>
            ${filteredUnlabeled.map(u=>{
              const labelInfo = labels.get(u.labelKey) || {label:'', hidden:false};
              const labelCell = admin
                ? `<input class="label-input" data-key="${escapeHtml(u.labelKey)}" value="${escapeHtml(labelInfo.label)}" placeholder="+ label"><button class="add-psn-btn chip-btn chip-ghost" data-ids="${u.ids.join(',')}" data-ip="${escapeHtml(u.ip)}" title="assign a PSN ID to this IP">+ add PSN ID</button>`
                : `<span class="label-static">${escapeHtml(labelInfo.label)||'—'}</span>`;
              const uSelKey = unlabeledSelKey(u);
              const rowChecked = selected.has(uSelKey) ? 'checked' : '';
              return `
              <tr class="${admin?'unlabeled-row':''}" data-ids="${u.ids.join(',')}" data-ip="${escapeHtml(u.ip)}">
                <td class="checkbox-col"><input type="checkbox" class="row-check unlabeled-check" data-sel-key="${escapeHtml(uSelKey)}" ${rowChecked}></td>
                <td>${labelCell}</td>
                <td>${ipCell(u.ip, u.ids, {hidden: ipHidden.get(u.ip)||false, showEye:true})}</td>
                <td>${locationCell(u.location)}</td>
                <td>${u.count}</td>
                <td class="last-seen">${formatLastSeen(u.addedAt)}</td>
              </tr>
            `;}).join('')}
          </tbody>
        </table>
      </section>
    `;

    document.getElementById('selectAllUnlabeled').addEventListener('click', e=>{
      e.stopPropagation();
      if(e.target.checked) allUnlabeledSelKeys.forEach(k=>selected.add(k));
      else allUnlabeledSelKeys.forEach(k=>selected.delete(k));
      render();
    });

    unlabeledHolder.querySelectorAll('.unlabeled-check').forEach(cb=>{
      cb.addEventListener('change', e=>{
        const k = cb.dataset.selKey;
        if(cb.checked) selected.add(k); else selected.delete(k);
        renderBulkBar();
        const sa = document.getElementById('selectAllUnlabeled');
        if(sa) sa.checked = allUnlabeledSelKeys.every(kk=>selected.has(kk));
      });
    });

    if(admin){
      const openAddPsn = (tr) => {
        const ids = tr.dataset.ids.split(',').filter(Boolean).map(Number);
        promptAssignUsername({
          ids,
          currentUsername: '',
          title: `Add PSN ID for ${tr.dataset.ip}`,
          submitLabel: 'Add PSN ID'
        });
      };
      unlabeledHolder.querySelectorAll('.add-psn-btn').forEach(btn=>{
        btn.addEventListener('click', e=>{
          e.stopPropagation();
          openAddPsn(btn.closest('tr'));
        });
      });
      unlabeledHolder.querySelectorAll('.unlabeled-row').forEach(tr=>{
        tr.addEventListener('click', e=>{
          if(e.target.closest('.icon-btn') || e.target.closest('.label-input') || e.target.closest('.row-check') || e.target.closest('.add-psn-btn')) return;
          openAddPsn(tr);
        });
      });
    }
  }

  renderBulkBar();

  if(admin){
    document.querySelectorAll('.label-input').forEach(inp=>{
      inp.addEventListener('click', e => e.stopPropagation());
      let lastSaved = inp.value;
      inp.addEventListener('keydown', e=>{ if(e.key === 'Enter') inp.blur(); });
      inp.addEventListener('blur', ()=>{
        const val = inp.value.trim();
        if(val !== lastSaved){
          lastSaved = val;
          saveLabel(inp.dataset.key, val);
        }
      });
    });
  }

  document.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      copyToClipboard(btn.dataset.copy, btn);
    });
  });
  if(admin){
    document.querySelectorAll('.del-btn').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const ids = btn.dataset.ids.split(',').filter(Boolean).map(Number);
        promptDeleteIp(ids, btn.dataset.ip);
      });
    });
    document.querySelectorAll('.eye-btn').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        if(btn.dataset.unameKey !== undefined){
          promptToggleUsernameHidden(btn.dataset.unameKey, btn.dataset.unameDisplay);
        } else if(btn.dataset.ip !== undefined){
          promptToggleIpHidden(btn.dataset.ip);
        }
      });
    });
    document.querySelectorAll('.edit-psn-btn').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const ids = btn.dataset.ids.split(',').filter(Boolean).map(Number);
        promptAssignUsername({
          ids,
          currentUsername: btn.dataset.uname,
          title: `Edit PSN ID for ${btn.dataset.uname}`,
          submitLabel: 'Save'
        });
      });
    });
  }
}

function csvEscape(v){
  v = (v==null?'':String(v));
  if(/[",\n]/.test(v)) return '"' + v.replace(/"/g,'""') + '"';
  return v;
}

function exportFilteredCSV(){
  const q = search.value.trim().toLowerCase();
  const list = users.filter(u => matchesQuery(u, q));
  const filteredUnlabeled = unlabeled.filter(u =>
    !q || u.ip.toLowerCase().includes(q) || u.location.toLowerCase().includes(q)
  );

  if(!list.length && !filteredUnlabeled.length){
    showToast('nothing to export');
    return;
  }

  downloadCsvLines(buildCsvLines(list, filteredUnlabeled), 'peer-log-filtered');
  showToast('exported CSV');
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
