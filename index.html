<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Peer Log Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --obsidian:#09090b;
    --obsidian-2:#0c0c0f;
    --panel:#0f0f13;
    --panel-2:#131318;
    --line:rgba(34,197,94,.10);
    --line-2:rgba(34,197,94,.18);
    --line-strong:rgba(34,197,94,.30);
    --phosphor:#22c55e;
    --phosphor-glow:#4ade80;
    --phosphor-dim:rgba(34,197,94,.60);
    --phosphor-mute:rgba(34,197,94,.40);
    --phosphor-faint:rgba(34,197,94,.20);
    --text:#c7f0d4;
    --text-soft:rgba(199,240,212,.70);
    --dim:rgba(199,240,212,.40);
    --ok:#22c55e;
    --warn:#eab308;
    --danger:#ef4444;
    --danger-border:rgba(239,68,68,.35);
    --danger-border-soft:rgba(239,68,68,.15);
    --danger-subtle:rgba(239,68,68,.06);
    --danger-bg-hover:rgba(239,68,68,.10);
    --danger-bg-focus:rgba(239,68,68,.12);
    --danger-bg-active:rgba(239,68,68,.20);
    --danger-glow:rgba(239,68,68,.25);
    --danger-glow-focus:rgba(239,68,68,.40);
    --danger-inner:rgba(239,68,68,.45);
    --mono:'JetBrains Mono','SFMono-Regular','Fira Code','Consolas',ui-monospace,monospace;
    --motion-fast:100ms;
    --motion-ease:cubic-bezier(.2,.6,.2,1);
    --focus-props:border-color,color,background-color,box-shadow;
  }
  *{box-sizing:border-box;}
  html,body{-webkit-font-smoothing:antialiased;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 500px at 85% -10%, rgba(34,197,94,.06), transparent 60%),
      radial-gradient(900px 400px at 0% 100%, rgba(34,197,94,.04), transparent 55%),
      var(--obsidian);
    color:var(--text);
    font-family:var(--mono);
    font-size:13px;
    line-height:1.5;
    min-height:100vh;
    padding:24px 16px 100px;
    letter-spacing:.01em;
    position:relative;
  }
  /* scanline overlay */
  body::before{
    content:"";
    position:fixed;inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 2px,
      rgba(34,197,94,.025) 3px, rgba(34,197,94,.025) 3px
    );
    z-index:1;
    mix-blend-mode:screen;
  }
  /* moving scanline */
  body::after{
    content:"";
    position:fixed;left:0;right:0;height:120px;
    background:linear-gradient(to bottom, transparent, rgba(34,197,94,.04), transparent);
    pointer-events:none;
    animation:scan 8s linear infinite;
    z-index:2;
  }
  @keyframes scan{
    0%{transform:translateY(-120px);}
    100%{transform:translateY(100vh);}
  }
  .wrap{max-width:1000px;margin:0 auto;position:relative;z-index:3;}

  ::selection{background:var(--phosphor);color:var(--obsidian);}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:var(--panel);}
  ::-webkit-scrollbar-thumb{background:var(--line-strong);}
  ::-webkit-scrollbar-thumb:hover{background:var(--phosphor-dim);}

  /* ==== header / HUD ==== */
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:1px solid var(--line-2);
    padding:14px 4px 16px;
    margin-bottom:20px;
    gap:16px;
    flex-wrap:wrap;
    position:relative;
  }
  header::before{
    content:"// SESSION";
    position:absolute;
    top:-8px;left:12px;
    background:var(--obsidian);
    padding:0 8px;
    font-size:9px;
    color:var(--phosphor-mute);
    letter-spacing:.2em;
  }
  h1{
    font-size:15px;
    letter-spacing:.14em;
    text-transform:uppercase;
    margin:0;
    color:var(--text);
    font-weight:600;
    display:flex;
    align-items:center;
    gap:2px;
  }
  h1::before{
    content:">";
    color:var(--phosphor);
    margin-right:8px;
    animation:blink 1.1s step-end infinite;
  }
  h1 span{color:var(--phosphor);text-shadow:0 0 8px rgba(34,197,94,.6);}
  @keyframes blink{50%{opacity:0;}}

  .sub{
    color:var(--dim);
    font-size:10.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-top:8px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .dot{
    width:7px;height:7px;border-radius:0;
    background:var(--dim);
    display:inline-block;
    box-shadow:0 0 0 1px currentColor;
    color:var(--dim);
  }
  .dot.synced{
    background:var(--phosphor);
    color:var(--phosphor);
    box-shadow:0 0 0 1px var(--phosphor), 0 0 10px var(--phosphor);
    animation:pulse-glow 2.4s ease-in-out infinite;
  }
  .dot.syncing{
    background:var(--warn);color:var(--warn);
    box-shadow:0 0 0 1px var(--warn), 0 0 8px var(--warn);
    animation:pulse-glow 1s ease-in-out infinite;
  }
  .dot.err{background:var(--danger);color:var(--danger);box-shadow:0 0 0 1px var(--danger),0 0 8px var(--danger);}
  .dot.warn{background:var(--warn);color:var(--warn);box-shadow:0 0 0 1px var(--warn),0 0 8px var(--warn);}
  @keyframes pulse-glow{
    0%,100%{opacity:1;}
    50%{opacity:.45;}
  }

  .role-tag{
    font-size:9.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    padding:2px 8px;
    border-radius:0;
    border:1px solid var(--line-2);
    color:var(--phosphor-mute);
    font-weight:500;
    background:rgba(34,197,94,.04);
  }
  .role-tag::before{content:"[ ";opacity:.6;}
  .role-tag::after{content:" ]";opacity:.6;}
  .role-tag.admin{color:var(--warn);border-color:rgba(234,179,8,.4);background:rgba(234,179,8,.06);}
  .role-tag:empty{display:none;}

  .logout-link{
    background:none;border:1px solid transparent;
    color:var(--dim);
    font-family:var(--mono);font-size:10px;
    text-decoration:none;
    cursor:pointer;
    letter-spacing:.12em;
    text-transform:uppercase;
    padding:2px 6px;
  }
  .logout-link::before{content:"[ ";}
  .logout-link::after{content:" ]";}
  .logout-link:hover{color:var(--phosphor);border-color:var(--line-2);background:rgba(34,197,94,.06);}

  .count{
    font-size:10px;
    color:var(--phosphor-mute);
    letter-spacing:.15em;
    text-transform:uppercase;
    text-align:right;
    border:1px solid var(--line-2);
    padding:8px 14px;
    background:rgba(34,197,94,.04);
    position:relative;
  }
  .count::before{
    content:"PEERS";
    position:absolute;top:-7px;right:10px;
    background:var(--obsidian);
    padding:0 6px;
    font-size:8px;
    color:var(--phosphor-mute);
    letter-spacing:.2em;
  }
  .count b{
    color:var(--phosphor);
    font-size:20px;
    display:block;
    font-weight:600;
    letter-spacing:.05em;
    line-height:1;
    text-shadow:0 0 8px rgba(34,197,94,.5);
    margin-bottom:2px;
  }

  /* ==== dropzone ==== */
  .dropzone{
    border:1px dashed var(--line-strong);
    background:
      repeating-linear-gradient(45deg, transparent 0 8px, rgba(34,197,94,.02) 8px 9px),
      var(--panel);
    border-radius:0;
    padding:32px 20px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, background .15s, box-shadow .15s;
    margin-bottom:20px;
    display:block;
    position:relative;
  }
  .dropzone::before{
    content:"// INGEST";
    position:absolute;top:-8px;left:14px;
    background:var(--obsidian);
    padding:0 8px;
    font-size:9px;
    color:var(--phosphor-mute);
    letter-spacing:.2em;
  }
  .dropzone:hover, .dropzone.drag{
    border-color:var(--phosphor);
    background:rgba(34,197,94,.05);
    box-shadow:inset 0 0 30px rgba(34,197,94,.06);
  }
  .dropzone p{margin:0;color:var(--dim);font-size:11px;letter-spacing:.03em;line-height:1.6;}
  .dropzone p.main{color:var(--text);font-size:12.5px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em;}
  .dropzone .accent{color:var(--phosphor);text-shadow:0 0 6px rgba(34,197,94,.4);}
  input[type=file]{display:none;}

  /* ==== toolbar ==== */
  .toolbar{
    display:flex;
    gap:8px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .search{
    flex:1;
    min-width:200px;
    background:var(--panel);
    border:1px solid var(--line-2);
    color:var(--phosphor);
    padding:10px 14px 10px 28px;
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.05em;
    text-transform:uppercase;
    border-radius:0;
    outline:none;
    transition:var(--focus-props) var(--motion-fast) var(--motion-ease);
    background-image:linear-gradient(to right, transparent 12px, transparent);
    position:relative;
  }
  /* $ prompt on the search input, via wrapper trick using background */
  .toolbar{position:relative;}
  .search{
    background-image:
      radial-gradient(circle at 12px 50%, var(--phosphor) 1.5px, transparent 2px),
      none;
  }
  .search:hover{border-color:var(--phosphor-dim);}
  .search:focus,
  .search:focus-visible{
    border-color:var(--phosphor);
    box-shadow:0 0 0 1px var(--phosphor), 0 0 12px rgba(34,197,94,.25), inset 0 0 20px rgba(34,197,94,.05);
  }
  .search:not(:placeholder-shown){border-color:var(--phosphor-dim);color:var(--phosphor);}
  .search::placeholder{color:var(--phosphor-faint);text-transform:uppercase;letter-spacing:.1em;}

  /* ==== buttons ==== */
  .btn{
    background:var(--panel);
    border:1px solid var(--line-2);
    color:var(--phosphor-dim);
    padding:9px 16px;
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    border-radius:0;
    cursor:pointer;
    transition:var(--focus-props) var(--motion-fast) var(--motion-ease);
    white-space:nowrap;
    position:relative;
    font-weight:500;
  }
  .btn::before{content:"[ ";color:var(--phosphor-mute);}
  .btn::after{content:" ]";color:var(--phosphor-mute);}
  .btn:hover{
    border-color:var(--phosphor);
    color:var(--phosphor);
    background:rgba(34,197,94,.08);
    box-shadow:0 0 0 1px var(--phosphor), 0 0 12px rgba(34,197,94,.2);
  }
  .btn:hover::before,.btn:hover::after{color:var(--phosphor);}
  .btn:focus{outline:none;}
  .btn:focus-visible{
    outline:none;
    border-color:var(--phosphor);
    color:var(--phosphor);
    background:rgba(34,197,94,.1);
    box-shadow:0 0 0 1px var(--phosphor), 0 0 12px rgba(34,197,94,.35), inset 0 0 0 1px rgba(34,197,94,.15);
  }
  .btn:focus-visible::before,.btn:focus-visible::after{color:var(--phosphor);}
  .btn:active,
  .btn.is-active{
    transform:translateY(1px);
    background:rgba(34,197,94,.18);
    border-color:var(--phosphor);
    color:var(--phosphor);
    box-shadow:inset 0 0 0 1px rgba(34,197,94,.35), inset 0 1px 0 rgba(0,0,0,.35);
  }
  .btn.primary{
    color:var(--obsidian);
    background:var(--phosphor);
    border-color:var(--phosphor);
    font-weight:600;
    box-shadow:0 0 12px rgba(34,197,94,.35);
  }
  .btn.primary::before,.btn.primary::after{color:var(--obsidian);opacity:.5;}
  .btn.primary:hover{
    background:var(--phosphor-glow);
    border-color:var(--phosphor-glow);
    color:var(--obsidian);
    box-shadow:0 0 20px rgba(34,197,94,.6);
  }
  .btn.primary:focus-visible{
    background:var(--phosphor-glow);
    border-color:var(--phosphor-glow);
    color:var(--obsidian);
    box-shadow:0 0 0 2px var(--obsidian), 0 0 0 3px var(--phosphor), 0 0 18px rgba(34,197,94,.55);
  }
  .btn.primary:active,
  .btn.primary.is-active{
    transform:translateY(1px);
    background:var(--phosphor);
    border-color:var(--phosphor);
    color:var(--obsidian);
    box-shadow:inset 0 1px 0 rgba(0,0,0,.35), 0 0 10px rgba(34,197,94,.4);
  }
  .btn.danger{
    color:var(--danger);
    border-color:var(--danger-border);
  }
  .btn.danger::before,.btn.danger::after{color:var(--danger);opacity:1;}
  .btn.danger:hover{color:var(--danger);border-color:var(--danger);background:var(--danger-bg-hover);box-shadow:0 0 0 1px var(--danger),0 0 10px var(--danger-glow);}
  .btn.danger:hover::before,.btn.danger:hover::after{color:var(--danger);}
  .btn.danger:focus-visible{
    color:var(--danger);
    border-color:var(--danger);
    background:var(--danger-bg-focus);
    box-shadow:0 0 0 1px var(--danger), 0 0 12px var(--danger-glow-focus), inset 0 0 0 1px var(--danger-bg-focus);
  }
  .btn.danger:focus-visible::before,.btn.danger:focus-visible::after{color:var(--danger);}
  .btn.danger:active,
  .btn.danger.is-active{
    color:var(--danger);
    border-color:var(--danger);
    background:var(--danger-bg-active);
    box-shadow:inset 0 0 0 1px var(--danger-inner), inset 0 1px 0 rgba(0,0,0,.35);
  }
  .btn.danger:active::before,.btn.danger.is-active::before,
  .btn.danger:active::after,.btn.danger.is-active::after{color:var(--danger);}
  .btn.danger:disabled,
  .btn.danger:disabled:hover,
  .btn.danger:disabled:focus-visible{
    color:var(--danger);
    border-color:var(--danger-border);
    background:var(--panel);
    box-shadow:none;
    opacity:.4;
  }
  .btn.danger:disabled::before,.btn.danger:disabled::after{color:var(--danger);}
  .btn.warn:hover{color:var(--warn);border-color:var(--warn);background:rgba(234,179,8,.08);box-shadow:0 0 0 1px var(--warn),0 0 10px rgba(234,179,8,.25);}
  .btn.warn:hover::before,.btn.warn:hover::after{color:var(--warn);}
  .btn.warn:focus-visible{
    color:var(--warn);
    border-color:var(--warn);
    background:rgba(234,179,8,.12);
    box-shadow:0 0 0 1px var(--warn), 0 0 12px rgba(234,179,8,.35), inset 0 0 0 1px rgba(234,179,8,.18);
  }
  .btn.warn:focus-visible::before,.btn.warn:focus-visible::after{color:var(--warn);}
  .btn.warn:active,
  .btn.warn.is-active{
    color:var(--warn);
    border-color:var(--warn);
    background:rgba(234,179,8,.2);
    box-shadow:inset 0 0 0 1px rgba(234,179,8,.4), inset 0 1px 0 rgba(0,0,0,.35);
  }
  .btn:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none;}
  .btn:disabled:hover{border-color:var(--line-2);color:var(--phosphor-dim);background:var(--panel);}
  .btn:disabled:focus-visible{box-shadow:none;background:var(--panel);border-color:var(--line-2);color:var(--phosphor-dim);}
  @media (prefers-reduced-motion: reduce){
    .btn{transition:none;}
    .btn:active,.btn.is-active{transform:none;}
  }

  /* ==== bulk bar ==== */
  .bulk-bar{
    display:flex;
    align-items:center;
    gap:10px;
    margin:0 0 16px;
    padding:10px 14px;
    background:var(--panel);
    border:1px solid var(--phosphor);
    border-radius:0;
    flex-wrap:wrap;
    box-shadow:0 0 0 1px rgba(34,197,94,.15), 0 0 24px rgba(34,197,94,.15), inset 0 0 0 1px rgba(34,197,94,.08);
    position:relative;
  }
  .bulk-bar::before{
    content:"// BULK_OP";
    position:absolute;top:-8px;left:12px;
    background:var(--obsidian);
    padding:0 8px;
    font-size:9px;
    color:var(--phosphor);
    letter-spacing:.2em;
  }
  .bulk-bar .count{
    color:var(--obsidian);
    background:var(--phosphor);
    padding:4px 12px;
    border:1px solid var(--phosphor);
    font-size:10.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    margin-right:auto;
    font-weight:700;
    text-shadow:none;
    box-shadow:0 0 0 1px rgba(34,197,94,.15), 0 0 12px rgba(34,197,94,.4);
    transition:var(--focus-props) var(--motion-fast) var(--motion-ease);
    position:relative;
  }
  .bulk-bar .count::before{display:none;}
  .bulk-bar .count b{display:inline;font-size:inherit;font-weight:700;color:var(--obsidian);text-shadow:none;margin:0;}
  .bulk-bar .count:focus-visible{
    outline:none;
    border-color:var(--phosphor-glow);
    background:var(--phosphor-glow);
    color:var(--obsidian);
    box-shadow:0 0 0 2px var(--obsidian), 0 0 0 3px var(--phosphor), 0 0 18px rgba(34,197,94,.55);
  }
  .bulk-bar .count:active,
  .bulk-bar .count.is-active{
    transform:translateY(1px);
    background:var(--phosphor);
    border-color:var(--phosphor);
    color:var(--obsidian);
    box-shadow:inset 0 1px 0 rgba(0,0,0,.35), 0 0 10px rgba(34,197,94,.4);
  }
  .bulk-bar .btn:focus-visible{z-index:1;}

  .checkbox-col{width:32px;}
  .row-check{
    width:14px;height:14px;
    cursor:pointer;
    accent-color:var(--phosphor);
    vertical-align:middle;
    appearance:none;
    -webkit-appearance:none;
    border:1px solid var(--line-strong);
    background:var(--obsidian);
    display:inline-block;
    position:relative;
    border-radius:0;
    transition:var(--focus-props) var(--motion-fast) var(--motion-ease);
  }
  .row-check:hover{border-color:var(--phosphor);}
  .row-check:focus-visible{
    outline:none;
    border-color:var(--phosphor);
    box-shadow:0 0 0 2px var(--obsidian), 0 0 0 3px var(--phosphor), 0 0 8px rgba(34,197,94,.4);
  }
  .row-check:checked{
    background:var(--phosphor);
    border-color:var(--phosphor);
    box-shadow:0 0 8px rgba(34,197,94,.5);
  }
  .row-check:checked:focus-visible{
    box-shadow:0 0 0 2px var(--obsidian), 0 0 0 3px var(--phosphor), 0 0 10px rgba(34,197,94,.6);
  }
  .row-check:checked::after{
    content:"";
    position:absolute;
    inset:3px;
    background:var(--obsidian);
  }
  .row-check:indeterminate{
    background:var(--phosphor);
    border-color:var(--phosphor);
    box-shadow:0 0 8px rgba(34,197,94,.5);
  }
  .row-check:indeterminate:focus-visible{
    box-shadow:0 0 0 2px var(--obsidian), 0 0 0 3px var(--phosphor), 0 0 10px rgba(34,197,94,.6);
  }
  .row-check:indeterminate::after{
    content:"";
    position:absolute;
    top:6px;
    left:3px;
    right:3px;
    height:2px;
    background:var(--obsidian);
  }

  /* ==== block titles ==== */
  section.block{margin-bottom:32px;}
  .block-title{
    font-size:10px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--phosphor-mute);
    margin:0 0 10px 2px;
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:500;
  }
  .block-title::before{
    content:"//";
    color:var(--phosphor);
  }
  .block-title .n{
    color:var(--phosphor);
    text-shadow:0 0 6px rgba(34,197,94,.4);
  }

  /* ==== tables ==== */
  table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border:1px solid var(--line-2);
    border-radius:0;
    overflow:hidden;
    font-size:12px;
    font-family:var(--mono);
  }
  .main-table td:nth-child(3){overflow-wrap:break-word;}
  .main-table thead th:nth-child(4), .main-table tbody td:nth-child(4){padding-left:18px;}
  thead th{
    text-align:left;
    padding:11px 14px;
    color:var(--phosphor-mute);
    font-weight:500;
    letter-spacing:.16em;
    text-transform:uppercase;
    font-size:9.5px;
    border-bottom:1px solid var(--line-2);
    background:rgba(34,197,94,.05);
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
    transition:var(--focus-props) var(--motion-fast) var(--motion-ease);
  }
  thead th:hover{color:var(--phosphor);background:rgba(34,197,94,.08);}
  thead th.sorted{color:var(--phosphor);text-shadow:0 0 6px rgba(34,197,94,.4);}
  thead th .arrow{opacity:.8;margin-left:4px;font-size:9px;}
  thead th:focus{outline:none;}
  thead th:focus-visible{
    outline:none;
    border-color:var(--phosphor);
    color:var(--phosphor);
    background:rgba(34,197,94,.1);
    box-shadow:0 0 0 1px var(--phosphor), 0 0 10px rgba(34,197,94,.35), inset 0 0 0 1px rgba(34,197,94,.15);
  }
  thead th:active{
    transform:translateY(1px);
    background:rgba(34,197,94,.18);
    border-color:var(--phosphor);
    color:var(--phosphor);
    box-shadow:inset 0 0 0 1px rgba(34,197,94,.35), inset 0 1px 0 rgba(0,0,0,.35);
  }
  tbody td{
    padding:10px 14px;
    border-bottom:1px solid rgba(34,197,94,.06);
    color:var(--text);
    vertical-align:middle;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr.main-row{cursor:pointer;transition:background .1s;}
  tbody tr.main-row.row-even{background:rgba(34,197,94,.02);}
  tbody tr.main-row.row-odd{background:transparent;}
  tbody tr.main-row:hover{background:rgba(34,197,94,.08);}
  tbody tr.main-row:hover td{color:var(--phosphor-glow);}
  tbody tr.main-row:hover td:nth-child(3){color:var(--phosphor);text-shadow:0 0 6px rgba(34,197,94,.4);}

  .ip{color:var(--phosphor);letter-spacing:.02em;font-variant-numeric:tabular-nums;}
  .last-seen{color:var(--dim);font-size:11px;white-space:nowrap;text-transform:uppercase;letter-spacing:.08em;}

  .label-input{
    width:100%;
    min-width:70px;
    background:transparent;
    border:1px solid transparent;
    color:var(--text);
    font-family:var(--mono);
    font-size:12px;
    padding:5px 8px;
    border-radius:0;
    outline:none;
    transition:var(--focus-props) var(--motion-fast) var(--motion-ease);
    letter-spacing:.02em;
  }
  .label-input::placeholder{color:var(--phosphor-faint);}
  .label-input:hover{border-color:var(--line-2);background:rgba(34,197,94,.04);}
  .label-input:focus,
  .label-input:focus-visible{
    outline:none;
    border-color:var(--phosphor);
    background:var(--obsidian);
    box-shadow:0 0 0 1px var(--phosphor), 0 0 8px rgba(34,197,94,.2), inset 0 0 0 1px rgba(34,197,94,.15);
  }
  .label-input:not(:placeholder-shown){border-color:var(--line-2);}
  .label-static{color:var(--dim);font-size:12px;padding:5px 8px;display:block;font-style:italic;}
  .label-static::before{content:"~ ";color:var(--phosphor-faint);}

  .ip-cell{display:flex;flex-direction:column;align-items:flex-start;gap:20px;}
  .ip-line{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}

  /* ==== chip buttons — bracketed tokens ==== */
  .chip-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:3px;
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:.1em;
    line-height:1;
    text-transform:uppercase;
    color:var(--phosphor-dim);
    background:transparent;
    border:1px solid var(--line-2);
    padding:1px 8px 0;
    height:22px;
    min-width:22px;
    border-radius:0;
    cursor:pointer;
    white-space:nowrap;
    vertical-align:middle;
    transition:var(--focus-props) var(--motion-fast) var(--motion-ease);
    margin-left:6px;
  }
  .chip-btn::before{content:"[";margin-right:2px;color:var(--phosphor-mute);opacity:.7;}
  .chip-btn::after{content:"]";margin-left:2px;color:var(--phosphor-mute);opacity:.7;}
  .ip-cell .chip-btn{margin-left:0;}
  .ip-actions,.uname-actions{display:inline-flex;align-items:center;gap:4px;flex-wrap:nowrap;white-space:nowrap;}
  .ip-actions{margin-top:20px;}
  .uname-actions{margin-left:6px;}
  .chip-btn:hover{
    border-color:var(--phosphor);
    color:var(--phosphor);
    background:rgba(34,197,94,.08);
    box-shadow:0 0 8px rgba(34,197,94,.2);
  }
  .chip-btn:hover::before,.chip-btn:hover::after{color:var(--phosphor);opacity:1;}
  .chip-btn:focus{outline:none;}
  .chip-btn:focus-visible{
    outline:none;
    border-color:var(--phosphor);
    color:var(--phosphor);
    background:rgba(34,197,94,.1);
    box-shadow:0 0 0 1px var(--phosphor), 0 0 10px rgba(34,197,94,.35), inset 0 0 0 1px rgba(34,197,94,.15);
  }
  .chip-btn:focus-visible::before,.chip-btn:focus-visible::after{color:var(--phosphor);opacity:1;}
  .chip-btn:active,
  .chip-btn.is-active{
    transform:translateY(1px);
    background:rgba(34,197,94,.18);
    border-color:var(--phosphor);
    color:var(--phosphor);
    box-shadow:inset 0 0 0 1px rgba(34,197,94,.35), inset 0 1px 0 rgba(0,0,0,.35);
  }
  .chip-btn.chip-icon{padding:0;width:22px;font-size:11px;letter-spacing:0;line-height:22px;}
  .chip-btn.chip-icon::before,.chip-btn.chip-icon::after{display:none;}
  .chip-btn.chip-ghost{border-style:dashed;}
  .chip-btn.chip-ghost:hover{border-style:solid;}
  .chip-btn.chip-ghost:focus-visible{border-style:solid;}
  .chip-btn.chip-accent{color:var(--phosphor);border-color:var(--phosphor-dim);background:rgba(34,197,94,.06);}
  .chip-btn.chip-accent:hover{background:rgba(34,197,94,.14);box-shadow:0 0 10px rgba(34,197,94,.3);}
  .chip-btn.chip-warn{color:var(--phosphor-dim);}
  .chip-btn.chip-warn:hover{color:var(--warn);border-color:var(--warn);background:rgba(234,179,8,.1);box-shadow:0 0 8px rgba(234,179,8,.25);}
  .chip-btn.chip-warn:hover::before,.chip-btn.chip-warn:hover::after{color:var(--warn);}
  .chip-btn.chip-warn:focus-visible{
    color:var(--warn);
    border-color:var(--warn);
    background:rgba(234,179,8,.12);
    box-shadow:0 0 0 1px var(--warn), 0 0 10px rgba(234,179,8,.35), inset 0 0 0 1px rgba(234,179,8,.18);
  }
  .chip-btn.chip-warn:focus-visible::before,.chip-btn.chip-warn:focus-visible::after{color:var(--warn);}
  .chip-btn.chip-warn:active,
  .chip-btn.chip-warn.is-active{
    color:var(--warn);
    border-color:var(--warn);
    background:rgba(234,179,8,.2);
    box-shadow:inset 0 0 0 1px rgba(234,179,8,.4), inset 0 1px 0 rgba(0,0,0,.35);
  }
  .chip-btn.chip-danger{color:var(--danger);border-color:var(--danger-border);}
  .chip-btn.chip-danger::before,.chip-btn.chip-danger::after{color:var(--danger);opacity:1;}
  .chip-btn.chip-danger:hover{color:var(--danger);border-color:var(--danger);background:var(--danger-bg-hover);box-shadow:0 0 8px var(--danger-glow);}
  .chip-btn.chip-danger:hover::before,.chip-btn.chip-danger:hover::after{color:var(--danger);}
  .chip-btn.chip-danger:focus-visible{
    color:var(--danger);
    border-color:var(--danger);
    background:var(--danger-bg-focus);
    box-shadow:0 0 0 1px var(--danger), 0 0 10px var(--danger-glow-focus), inset 0 0 0 1px var(--danger-bg-focus);
  }
  .chip-btn.chip-danger:focus-visible::before,.chip-btn.chip-danger:focus-visible::after{color:var(--danger);}
  .chip-btn.chip-danger:active,
  .chip-btn.chip-danger.is-active{
    color:var(--danger);
    border-color:var(--danger);
    background:var(--danger-bg-active);
    box-shadow:inset 0 0 0 1px var(--danger-inner), inset 0 1px 0 rgba(0,0,0,.35);
  }
  .chip-btn.chip-danger:active::before,.chip-btn.chip-danger.is-active::before,
  .chip-btn.chip-danger:active::after,.chip-btn.chip-danger.is-active::after{color:var(--danger);}
  .chip-btn.copied{color:var(--phosphor);border-color:var(--phosphor);background:rgba(34,197,94,.15);box-shadow:0 0 10px rgba(34,197,94,.4);}
  .chip-btn.copied::before,.chip-btn.copied::after{color:var(--phosphor);opacity:1;}
  .chip-btn.chip-alert{
    color:var(--warn);
    border-color:var(--warn);
    background:rgba(234,179,8,.1);
    cursor:help;
    animation:alertPulse 2s ease-in-out infinite;
  }
  .chip-btn.chip-alert::before,.chip-btn.chip-alert::after{color:var(--warn);}
  .chip-btn.chip-alert:hover{background:rgba(234,179,8,.2);box-shadow:0 0 8px rgba(234,179,8,.35);}
  @keyframes alertPulse{0%,100%{opacity:1;}50%{opacity:.65;}}
  .icon-btn:hover{
    border-color:var(--phosphor);
    color:var(--phosphor);
    background:rgba(34,197,94,.08);
    box-shadow:0 0 8px rgba(34,197,94,.2);
  }
  .icon-btn:focus{outline:none;}
  .icon-btn:focus-visible{
    outline:none;
    border-color:var(--phosphor);
    color:var(--phosphor);
    background:rgba(34,197,94,.1);
    box-shadow:0 0 0 1px var(--phosphor), 0 0 10px rgba(34,197,94,.35), inset 0 0 0 1px rgba(34,197,94,.15);
  }
  .icon-btn:active,
  .icon-btn.is-active{
    transform:translateY(1px);
    background:rgba(34,197,94,.18);
    border-color:var(--phosphor);
    color:var(--phosphor);
    box-shadow:inset 0 0 0 1px rgba(34,197,94,.35), inset 0 1px 0 rgba(0,0,0,.35);
  }
  @media (prefers-reduced-motion: reduce){
    .chip-btn,.icon-btn{transition:none;}
    .chip-btn:active,.chip-btn.is-active,.icon-btn:active,.icon-btn.is-active{transform:none;}
  }

  /* ==== expandable rows ==== */
  tr.unlabeled-row{cursor:pointer;}
  tr.unlabeled-row:hover td{background:rgba(34,197,94,.06);}
  .caret{display:inline-block;transition:transform .12s;margin-right:8px;color:var(--phosphor-mute);}
  .caret::before{content:"▸";}
  tr.expanded .caret{transform:rotate(90deg);color:var(--phosphor);text-shadow:0 0 6px var(--phosphor);}

  @keyframes rowFadeIn{
    from{opacity:0;transform:translateY(-3px);}
    to{opacity:1;transform:translateY(0);}
  }
  tr.hist-row{animation:rowFadeIn .16s ease-out;}
  .uname-actions{animation:rowFadeIn .14s ease-out;}

  tr.hist-row td{
    padding:6px 14px;
    font-size:11px;
    color:var(--phosphor-mute);
    border-bottom:1px solid rgba(34,197,94,.05);
    background:rgba(0,0,0,.35);
  }
  tr.hist-row td:nth-child(4){
    padding-left:38px;
    position:relative;
  }
  tr.hist-row td:nth-child(4)::before{
    content:"└─";
    position:absolute;
    left:20px;
    color:var(--phosphor-faint);
  }
  tr.hist-row.row-even td{background:rgba(0,0,0,.35);}
  tr.hist-row.row-odd td{background:rgba(0,0,0,.5);}
  tr.hist-row td.ip{color:var(--phosphor-dim);}
  tr.hist-row.newest td{color:var(--text);}
  tr.hist-row.newest td.ip{color:var(--phosphor);text-shadow:0 0 6px rgba(34,197,94,.4);}
  .hist-tag{
    font-size:8.5px;
    color:var(--obsidian);
    background:var(--phosphor);
    padding:2px 6px;
    border-radius:0;
    margin-left:10px;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-weight:700;
    box-shadow:0 0 8px rgba(34,197,94,.4);
  }

  /* ==== empty state ==== */
  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--dim);
    font-size:12px;
    border:1px dashed var(--line-2);
    background:var(--panel);
    border-radius:0;
    text-transform:uppercase;
    letter-spacing:.1em;
  }
  .empty::before{content:"// ";color:var(--phosphor-mute);}
  .empty .accent{color:var(--phosphor);text-shadow:0 0 6px rgba(34,197,94,.4);}

  .unlabeled-note{
    font-size:10.5px;
    color:var(--phosphor-mute);
    margin:0 0 10px 2px;
    line-height:1.6;
    letter-spacing:.06em;
    text-transform:uppercase;
  }
  .unlabeled-note::before{content:"[ NOTE ] ";color:var(--phosphor);}
  .warn{color:var(--warn);}

  .unlabeled-table tbody tr:nth-child(even) td{background:rgba(34,197,94,.02);}
  .unlabeled-table tbody tr:hover td{background:rgba(34,197,94,.06);}

  /* ==== add-row / other standalone btns ==== */
  #addRowBtn::before{content:"[ + ";}
  #addRowBtn::after{content:" ]";}
  #addRowBtn{color:var(--phosphor-dim);}
  #addRowBtn:hover{color:var(--phosphor);}

  /* ==== toast ==== */
  .toast{
    position:fixed;
    bottom:28px;
    left:50%;
    transform:translateX(-50%) translateY(0);
    background:var(--obsidian);
    border:1px solid var(--phosphor);
    color:var(--phosphor);
    padding:10px 20px;
    border-radius:0;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    opacity:0;
    pointer-events:none;
    transition:opacity .15s, transform .15s;
    max-width:80vw;
    text-align:center;
    z-index:200;
    box-shadow:0 0 0 1px var(--phosphor), 0 0 24px rgba(34,197,94,.4);
  }
  .toast::before{content:">> ";color:var(--phosphor-mute);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-8px);}
  .toast.err{border-color:var(--danger);color:var(--danger);box-shadow:0 0 0 1px var(--danger),0 0 24px var(--danger-glow-focus);}
  .toast.err::before{color:var(--danger);opacity:.6;}

  /* ==== chip tooltip ==== */
  .chip-tip{
    position:relative;
    display:inline-flex;
    align-items:center;
    vertical-align:middle;
    margin-left:6px;
  }
  .chip-tip .chip-btn{margin-left:0;}
  .ip-cell .chip-tip{margin-left:0;}
  .chip-tip[data-tooltip]::after{
    content:attr(data-tooltip);
    position:absolute;
    left:50%;
    bottom:calc(100% + 6px);
    transform:translateX(-50%);
    padding:4px 8px;
    background:var(--obsidian);
    color:var(--phosphor);
    border:1px solid var(--phosphor);
    font-family:var(--mono);
    font-size:9px;
    letter-spacing:.12em;
    text-transform:uppercase;
    white-space:nowrap;
    pointer-events:none;
    z-index:201;
    box-shadow:0 0 0 1px rgba(34,197,94,.15), 0 0 16px rgba(34,197,94,.25);
    opacity:0;
    visibility:hidden;
    transition:none;
  }
  .chip-tip[data-tooltip]::before{
    content:"";
    position:absolute;
    left:50%;
    bottom:calc(100% + 1px);
    transform:translateX(-50%);
    border:5px solid transparent;
    border-top-color:var(--phosphor);
    pointer-events:none;
    z-index:202;
    opacity:0;
    visibility:hidden;
    transition:none;
  }
  .chip-tip:hover::after,
  .chip-tip:focus-within::after,
  .chip-tip:hover::before,
  .chip-tip:focus-within::before{
    opacity:1;
    visibility:visible;
  }
  .chip-tip.danger::after{color:var(--danger);border-color:var(--danger);box-shadow:0 0 0 1px var(--danger-border-soft), 0 0 16px var(--danger-glow);}
  .chip-tip.danger::before{border-top-color:var(--danger);}
  .chip-tip.warn::after{color:var(--warn);border-color:var(--warn);box-shadow:0 0 0 1px rgba(234,179,8,.15), 0 0 16px rgba(234,179,8,.25);}
  .chip-tip.warn::before{border-top-color:var(--warn);}


  /* ==== footer ==== */
  footer{
    margin-top:36px;
    text-align:center;
    color:var(--phosphor-faint);
    font-size:9.5px;
    letter-spacing:.3em;
    text-transform:uppercase;
    padding:20px 0;
    border-top:1px solid var(--line);
  }
  footer::before{content:"// ";color:var(--phosphor-mute);}

  /* ==== gate screen ==== */
  .gate-screen{
    min-height:80vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    z-index:3;
  }
  .gate-box{
    width:100%;
    max-width:360px;
    text-align:center;
    background:var(--panel);
    padding:32px 28px;
    border:1px solid var(--phosphor);
    border-radius:0;
    box-shadow:0 0 0 1px rgba(34,197,94,.15), 0 0 40px rgba(34,197,94,.15), inset 0 0 30px rgba(34,197,94,.03);
    position:relative;
  }
  .gate-box::before{
    content:"// AUTHENTICATE";
    position:absolute;
    top:-8px;left:14px;
    background:var(--obsidian);
    padding:0 8px;
    font-size:9px;
    color:var(--phosphor);
    letter-spacing:.2em;
  }
  .gate-box::after{
    content:"█";
    position:absolute;
    top:-8px;right:14px;
    background:var(--obsidian);
    padding:0 6px;
    font-size:10px;
    color:var(--phosphor);
    animation:blink 1.1s step-end infinite;
  }
  .gate-title{
    font-size:17px;
    letter-spacing:.18em;
    text-transform:uppercase;
    margin:0 0 8px;
    font-weight:600;
    color:var(--text);
  }
  .gate-title span{color:var(--phosphor);text-shadow:0 0 8px rgba(34,197,94,.6);}
  .gate-sub{
    color:var(--phosphor-mute);
    font-size:10.5px;
    margin:0 0 22px;
    letter-spacing:.14em;
    text-transform:uppercase;
  }
  .gate-sub::before{content:"> ";color:var(--phosphor);}
  .gate-tabs{
    display:flex;
    border:1px solid var(--line-2);
    border-radius:0;
    overflow:hidden;
    margin-bottom:18px;
  }
  .gate-tab{
    flex:1;
    background:transparent;
    border:none;
    color:var(--phosphor-mute);
    padding:10px 0;
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:.16em;
    text-transform:uppercase;
    cursor:pointer;
    transition:var(--focus-props) var(--motion-fast) var(--motion-ease);
    font-weight:500;
  }
  .gate-tab:hover{color:var(--phosphor);background:rgba(34,197,94,.05);}
  .gate-tab.active{color:var(--obsidian);background:var(--phosphor);text-shadow:none;box-shadow:0 0 12px rgba(34,197,94,.35);}
  .gate-input{
    width:100%;
    background:var(--obsidian);
    border:1px solid var(--line-strong);
    color:var(--phosphor);
    padding:12px 14px;
    font-family:var(--mono);
    font-size:13px;
    letter-spacing:.15em;
    border-radius:0;
    outline:none;
    margin-bottom:10px;
    transition:var(--focus-props) var(--motion-fast) var(--motion-ease);
    text-align:center;
  }
  .gate-input:hover{border-color:var(--phosphor-dim);}
  .gate-input:focus,
  .gate-input:focus-visible{
    outline:none;
    border-color:var(--phosphor);
    box-shadow:0 0 0 1px var(--phosphor), 0 0 14px rgba(34,197,94,.3), inset 0 0 20px rgba(34,197,94,.06);
  }
  .gate-input::placeholder{color:var(--phosphor-faint);letter-spacing:.2em;}
  .gate-error{color:var(--danger);font-size:10px;margin:0 0 10px;min-height:14px;letter-spacing:.1em;text-transform:uppercase;}
  .gate-error:not(:empty)::before{content:"! ERR: ";}
  .gate-submit{width:100%;padding:12px;letter-spacing:.2em;font-size:11px;}

  /* ==== modal ==== */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.75);
    display:flex;align-items:center;justify-content:center;
    z-index:100;
    padding:20px;
    backdrop-filter:blur(2px);
  }
  .modal-box{
    background:var(--panel);
    border:1px solid var(--phosphor);
    border-radius:0;
    padding:24px;
    width:100%;
    max-width:360px;
    box-shadow:0 0 0 1px rgba(34,197,94,.2), 0 0 40px rgba(34,197,94,.25);
    position:relative;
  }
  .modal-box::before{
    content:"// INPUT";
    position:absolute;
    top:-8px;left:14px;
    background:var(--panel);
    padding:0 8px;
    font-size:9px;
    color:var(--phosphor);
    letter-spacing:.2em;
  }
  .modal-box h3{
    margin:0 0 16px;
    font-size:12px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--text);
    font-weight:600;
  }
  .modal-box h3::before{content:"> ";color:var(--phosphor);}
  .modal-label{
    display:block;
    font-size:10px;
    color:var(--phosphor-mute);
    letter-spacing:.14em;
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .modal-input{
    display:block;
    width:100%;
    margin-top:8px;
    background:var(--obsidian);
    border:1px solid var(--line-strong);
    color:var(--phosphor);
    padding:10px 12px;
    font-family:var(--mono);
    font-size:12.5px;
    letter-spacing:.06em;
    border-radius:0;
    outline:none;
    transition:var(--focus-props) var(--motion-fast) var(--motion-ease);
  }
  .modal-input:hover{border-color:var(--phosphor-dim);}
  .modal-input:focus,
  .modal-input:focus-visible{
    outline:none;
    border-color:var(--phosphor);
    box-shadow:0 0 0 1px var(--phosphor), 0 0 12px rgba(34,197,94,.28), inset 0 0 0 1px rgba(34,197,94,.12);
  }
  .modal-danger .modal-input:focus,
  .modal-danger .modal-input:focus-visible{
    border-color:var(--danger);
    box-shadow:0 0 0 1px var(--danger), 0 0 12px var(--danger-glow), inset 0 0 0 1px var(--danger-border-soft);
  }
  .modal-error{color:var(--danger);font-size:10.5px;margin:0 0 12px;display:none;letter-spacing:.1em;text-transform:uppercase;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:4px;}
  /* modal buttons inherit .btn focus-visible ring + pressed state;
     scope tightens their visual weight so both actions look paired */
  .modal-actions .btn{min-width:96px;}
  .modal-actions .btn:focus-visible{z-index:1;}
  .modal-danger .modal-actions .modal-cancel:focus-visible{
    border-color:var(--phosphor);
    color:var(--phosphor);
    box-shadow:0 0 0 1px var(--phosphor), 0 0 12px rgba(34,197,94,.3), inset 0 0 0 1px rgba(34,197,94,.15);
  }

  /* ==== modal dropdowns / menu items ==== */
  .modal-box select,
  .modal-box .dropdown-trigger,
  .modal-box [role="combobox"]{
    display:block;
    width:100%;
    margin-top:8px;
    background:var(--obsidian);
    border:1px solid var(--line-strong);

// ---------- offline upload queue ----------
// New CSV rows are queued in localStorage first, then we try to push them to
// Supabase right away. If that fails (no connection), they stay queued and
// get retried automatically when the browser comes back online.
const PENDING_KEY = 'peerlog_pending_uploads';
function getPendingRows(){
  try{ return JSON.parse(localStorage.getItem(PENDING_KEY) || '[]'); }
  catch(e){ return []; }
}
function setPendingRows(rows){
  try{ localStorage.setItem(PENDING_KEY, JSON.stringify(rows)); }catch(e){ console.error(e); }
}
function updateSyncIndicator(){
  const n = getPendingRows().length;
  if(n > 0){
    setSyncStatus('warn', `${n} row${n>1?'s':''} queued — waiting for connection`);
  } else if(navigator.onLine === false){
    setSyncStatus('warn', 'offline');
  } else {
    setSyncStatus('synced', 'synced');
  }
}
let flushInFlight = false;
async function flushPendingUploads(){
  if(flushInFlight) return;
  const pending = getPendingRows();
  if(!pending.length) return;
  if(navigator.onLine === false){ updateSyncIndicator(); return; }
  flushInFlight = true;
  setSyncStatus('syncing', `syncing ${pending.length} queued row${pending.length>1?'s':''}...`);
  try{
    await insertRows(pending);
    setPendingRows([]);
    await refreshFromCloud();
    showToast(`synced ${pending.length} queued row${pending.length>1?'s':''}`);
  }catch(e){
    console.error(e);
    updateSyncIndicator();
  }
  flushInFlight = false;
}
window.addEventListener('online', flushPendingUploads);
window.addEventListener('offline', updateSyncIndicator);

// ---------- hashing ----------
async function sha256Hex(str){
  const enc = new TextEncoder().encode(str || '');
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}

// ---------- Supabase REST helpers ----------
async function sbFetch(path, options={}){
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      ...(options.headers||{})
    }
  });
  if(!res.ok){
    const text = await res.text().catch(()=> '');
    throw new Error(text || res.statusText || 'request failed');
  }
  if(res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ---------- generic modal ----------
function openModal({title, fields=[], submitLabel='Confirm', danger=false, onSubmit}){
  return new Promise((resolve)=>{
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <h3>${title}</h3>
        <div class="modal-fields">
          ${fields.map(f=>{
            if(f.type==='select'){
              return `<label class="modal-label">${f.label}<select class="modal-input" data-field="${f.id}">${(f.options||[]).map(o=>`<option value="${escapeHtml(o.value)}" ${o.value===(f.value||'')?'selected':''}>${escapeHtml(o.label)}</option>`).join('')}</select></label>`;
            }
            return `<label class="modal-label">${f.label}<input class="modal-input" type="${f.type||'text'}" data-field="${f.id}" value="${f.value?escapeHtml(f.value):''}" autocomplete="off"></label>`;
          }).join('')}
        </div>
        <p class="modal-error"></p>
        <div class="modal-actions">
          <button class="btn modal-cancel">Cancel</button>
          <button class="btn ${danger?'danger':'primary'} modal-submit">${submitLabel}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const errorEl = overlay.querySelector('.modal-error');
    const submitBtn = overlay.querySelector('.modal-submit');
    const cancelBtn = overlay.querySelector('.modal-cancel');
    const inputs = [...overlay.querySelectorAll('.modal-input')];
    if(inputs[0]) setTimeout(()=>{ inputs[0].focus(); if(inputs[0].select) inputs[0].select(); }, 30);

    function close(result){ overlay.remove(); resolve(result); }
    function collect(){
      const vals = {};
      inputs.forEach(inp => vals[inp.dataset.field] = inp.value);
      return vals;
    }
    async function doSubmit(){
      submitBtn.disabled = true;
      const prevLabel = submitBtn.textContent;
      submitBtn.textContent = '...';
      try{
        const result = await onSubmit(collect());
        if(result && result.ok){
          close(true);
          return;
        }
        errorEl.textContent = (result && result.message) || 'Failed';
        errorEl.style.display = 'block';
      }catch(e){
        errorEl.textContent = e.message || 'Error';
        errorEl.style.display = 'block';
      }
      submitBtn.disabled = false;
      submitBtn.textContent = prevLabel;
    }
    cancelBtn.addEventListener('click', ()=>close(false));
    overlay.addEventListener('click', e=>{ if(e.target===overlay) close(false); });
    submitBtn.addEventListener('click', doSubmit);
    inputs.forEach(inp => inp.addEventListener('keydown', e=>{ if(e.key==='Enter') doSubmit(); }));
  });
}
// Admin actions are already gated by the key at login, so admin-only prompts
// are plain confirmations — no repeated credential entry.
function confirmModal({title, submitLabel='Confirm', danger=true, onConfirm}){

      }catch(e){

      }
    }
  });
}

// ---------- destructive confirm (delete-only) ----------
// Distinct red-terminal variant so delete actions never blend in with
// benign confirms. Supports Enter=confirm, Esc=cancel.
function deleteConfirmModal({title='Confirm deletion', target='', warn='This action is permanent and cannot be undone.', submitLabel='Delete', onConfirm}){
  return new Promise((resolve)=>{
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const targetHtml = target ? `<span class="modal-target">TARGET &rsaquo; <b>${escapeHtml(target)}</b></span>` : '';
    overlay.innerHTML = `
      <div class="modal-box modal-danger" role="alertdialog" aria-modal="true">
        <h3>${escapeHtml(title)}</h3>
        <div class="modal-warn">
          <div>
            ${escapeHtml(warn)}
            ${targetHtml}
          </div>
        </div>
        <p class="modal-hint"><kbd>ENTER</kbd> confirm &nbsp; <kbd>ESC</kbd> cancel</p>
        <p class="modal-error"></p>
        <div class="modal-actions">
          <button class="btn modal-cancel">Cancel</button>
          <button class="btn danger modal-submit">${escapeHtml(submitLabel)}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const errorEl = overlay.querySelector('.modal-error');
    const submitBtn = overlay.querySelector('.modal-submit');
    const cancelBtn = overlay.querySelector('.modal-cancel');
    setTimeout(()=>submitBtn.focus(), 30);

    function close(result){
      document.removeEventListener('keydown', onKey);
      overlay.remove();
      resolve(result);
    }
    async function doSubmit(){
      submitBtn.disabled = true;
      cancelBtn.disabled = true;
      const prev = submitBtn.textContent;
      submitBtn.textContent = '...';
      try{
        await onConfirm();
        close(true);
        return;
      }catch(e){
        errorEl.textContent = (e && e.message) || 'Delete failed — check connection';
        errorEl.style.display = 'block';
      }
      submitBtn.disabled = false;
      cancelBtn.disabled = false;
      submitBtn.textContent = prev;
    }
    function onKey(e){
      if(e.key === 'Escape'){ e.preventDefault(); close(false); }
      else if(e.key === 'Enter' && !submitBtn.disabled){ e.preventDefault(); doSubmit(); }
    }
    document.addEventListener('keydown', onKey);
    cancelBtn.addEventListener('click', ()=>close(false));
    overlay.addEventListener('click', e=>{ if(e.target===overlay) close(false); });
    submitBtn.addEventListener('click', doSubmit);
  });
}

          <button class="btn primary gate-submit" id="gateSubmit">${tab==='view'?'Unlock':'Log in as admin'}</button>
        </div>
      </div>`;

    gateScreenEl.querySelectorAll('.gate-tab').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        tab = btn.dataset.tab;
        draw();
      });
    });

    const input = document.getElementById('gateInput');
    const err = document.getElementById('gateError');
    const submit = document.getElementById('gateSubmit');
    setTimeout(()=>input.focus(), 30);

    async function tryLogin(){
      submit.disabled = true;
      const hash = await sha256Hex(input.value);
      const expected = tab === 'view' ? passwordHash : keyHash;
      if(hash === expected){
        role = tab;
        sessionStorage.setItem('peerlog_role', role);
        gateScreenEl.innerHTML = '';
        showApp();
      } else {
        err.textContent = tab==='view' ? 'Incorrect password' : 'Incorrect key';
        submit.disabled = false;
      }
    }
    submit.addEventListener('click', tryLogin);
    input.addEventListener('keydown', e => { if(e.key==='Enter') tryLogin(); });
  }
  draw();
}

function normKey(k){
  const s = k.trim().toLowerCase();
  if(s.includes('user') || s.includes('player') || s.includes('name') || s.includes('gamertag') || s.includes('tag')) return 'username';
  if(s.includes('ip')) return 'ip';
  if(s.includes('city')) return 'city';
  if(s.includes('country')) return 'country';
  if(s.includes('loc')) return 'location';
  return s;
}

function parseFile(file){
  return new Promise(resolve=>{
    Papa.parse(file, {
      header:true,
      skipEmptyLines:true,
      complete: res => {
        const fieldMap = {};
        res.meta.fields.forEach(f => fieldMap[f] = normKey(f));
        const parsed = res.data.map(r => {
          const out = {username:'', ip:'', location:'', city:'', country:''};
          Object.keys(r).forEach(k=>{
            const nk = fieldMap[k];
            const val = (r[k]||'').toString().trim();
            if(nk === 'username' || nk === 'ip' || nk === 'location' || nk === 'city' || nk === 'country'){
              out[nk] = val;
            }
          });
          // Some exports (party-chat) give one combined "location" column.
          // Others (traffic export) give separate City/Country columns —
          // stitch those into the same "City, Country" shape either way.
          if(!out.location){
            out.location = (out.city && out.country) ? `${out.city}, ${out.country}` : (out.city || out.country || '');
          }
          delete out.city;
          delete out.country;
          return out;
        }).filter(r => r.username || r.ip || r.location);
        resolve(parsed);
      },
      error: () => resolve([])
    });
  });
}

async function handleFiles(files){
  if(!isAdmin()) return;
  setSyncStatus('syncing', 'reading file(s)...');
  const results = await Promise.all(files.map(parseFile));
  const allNewRows = results.flat().map(r => ({username:r.username, ip:r.ip, location:r.location}));

  await flushPendingUploads();
}

function buildGroups(){
  const map = new Map();
  const unlabeledMap = new Map();

  rawRows.forEach(r => {
    if(r.username){
      const key = r.username.toLowerCase();
      if(!map.has(key)) map.set(key, {username:r.username, ipMap:new Map()});
      const g = map.get(key);
      g.username = r.username;
      const existing = g.ipMap.get(r.ip);
      if(existing){
        existing.location = r.location;
        existing.idx = r.idx;
        existing.addedAt = r.addedAt;
        existing.ids.push(r.idx);
      } else {
        g.ipMap.set(r.ip, {location:r.location, idx:r.idx, addedAt:r.addedAt, ids:[r.idx]});
      }
    } else if(r.ip || r.location){
      const key = r.ip + '|' + r.location;
      if(!unlabeledMap.has(key)) unlabeledMap.set(key, {ip:r.ip, location:r.location, count:0, lastIdx:r.idx, addedAt:r.addedAt, ids:[], labelKey:'unlabeled::'+key});
      const u = unlabeledMap.get(key);
      u.count++;
      u.ids.push(r.idx);
      u.lastIdx = Math.max(u.lastIdx, r.idx);
      u.addedAt = r.addedAt;
    }
  });

  users = [...map.values()].map(g => {
    const history = [...g.ipMap.entries()].map(([ip, v]) => ({ip, location:v.location, idx:v.idx, addedAt:v.addedAt, ids:v.ids}));
    history.sort((a,b) => b.idx - a.idx);
    return {
      username: g.username,
      latestIp: history[0].ip,
      latestLocation: history[0].location,
      latestAddedAt: history[0].addedAt,
      history
    };
  });

  unlabeled = [...unlabeledMap.values()].sort((a,b) => b.lastIdx - a.lastIdx);

  ipToUsers = new Map();
  users.forEach(u => {
    u.history.forEach(h => {
      if(!h.ip) return;
      if(!ipToUsers.has(h.ip)) ipToUsers.set(h.ip, new Set());
      ipToUsers.get(h.ip).add(u.username);
    });
  });
}

function sharedIpUsers(ip, excludeUsername){
  const set = ipToUsers.get(ip);
  if(!set || set.size < 2) return [];
  return [...set].filter(n => n.toLowerCase() !== (excludeUsername||'').toLowerCase());
}

// ---------- link unlabeled IP to an existing PSN ID (matched by country) ----------
function countryPart(location){
  if(!location) return '';
  const parts = location.split(',');
  return parts[parts.length-1].trim().toLowerCase();
}

function candidatesForCountry(location){
  const country = countryPart(location);
  if(!country) return [];
  return users
    .filter(u => u.history.some(h => countryPart(h.location) === country))
    .map(u => u.username)
    .sort((a,b) => a.localeCompare(b));
}

function matchesQuery(u, q){
  if(!q) return true;
  if(u.username.toLowerCase().includes(q)) return true;
  return u.history.some(h => h.ip.toLowerCase().includes(q) || h.location.toLowerCase().includes(q));
}

function buildCsvLines(userList, unlabeledList){
  const lines = [['Label','PSN ID','IP','Location','IP History Count','Last Seen'].map(csvEscape).join(',')];
  userList.forEach(u=>{
    const labelVal = (labels.get(u.username.toLowerCase()) || {}).label || '';
    lines.push([labelVal, u.username, u.latestIp, u.latestLocation, u.history.length, u.latestAddedAt||''].map(csvEscape).join(','));
  });
  unlabeledList.forEach(u=>{
    const labelVal = (labels.get(u.labelKey) || {}).label || '';
    lines.push([labelVal, '', u.ip, u.location, u.count, u.addedAt||''].map(csvEscape).join(','));
  });
  return lines;
}

function downloadCsvLines(lines, filenamePrefix){
  const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  a.href = url;
  a.download = `${filenamePrefix}-${stamp}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function copyToClipboard(text, btnEl){
  const done = () => {
    showToast(`copied ${text}`);
    if(btnEl){
      btnEl.classList.add('copied');
      setTimeout(()=>btnEl.classList.remove('copied'), 900);
    }
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, cb){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); cb(); }catch(e){}
  document.body.removeChild(ta);
}
let toastTimer;

  toast.classList.toggle('err', !!isErr);

function maskUsername(name){
  if(!name) return name;
  return name.slice(0,2) + '••••';
}
function formatLastSeen(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  if(isNaN(d.getTime())) return '—';
  const now = new Date();
  const dayMs = 86400000;
  const utcThen = Date.UTC(d.getFullYear(), d.getMonth(), d.getDate());
  const utcNow = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
  const diffDays = Math.round((utcNow - utcThen) / dayMs);
  let text;
  if(diffDays <= 0) text = 'today';
  else if(diffDays === 1) text = '1 day ago';
  else if(diffDays < 30) text = `${diffDays} days ago`;
  else if(diffDays < 365){
    const m = Math.floor(diffDays/30);
    text = `${m} month${m>1?'s':''} ago`;
  } else {
    const y = Math.floor(diffDays/365);
    text = `${y} year${y>1?'s':''} ago`;
  }
  const full = d.toLocaleString('en-US', {month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit'});
  return `<span title="${escapeHtml(full)}">${escapeHtml(text)}</span>`;
}
function maskIp(ip){
  if(!ip) return ip;
  const parts = ip.split('.');
  if(parts.length === 4){
    return parts.map((p, i) => i===0 ? p : '*'.repeat(p.length)).join('.');
  }
  return '*'.repeat(ip.length);
}

function countryCodeToFlag(code){
  if(!/^[A-Za-z]{2}$/.test(code)) return '';
  const hex = [...code.toUpperCase()].map(c => (127397 + c.charCodeAt(0)).toString(16)).join('-');
  const url = `https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/72x72/${hex}.png`;
  return `<img src="${url}" alt="${code.toUpperCase()}" class="flag-icon" style="width:1.2em;height:1.2em;vertical-align:-0.2em;" loading="lazy">`;
}

  const copyBtn = ip ? `<button class="icon-btn copy-btn chip-btn chip-icon" data-copy="${copySafe}" title="copy IP" aria-label="copy IP">⧉</button>` : '';
  const delBtn = showActions ? ipDelBtn(ip, ids) : '';
  const eyeBtn = (showActions && showEye) ? ipHideBtn(ip, hidden) : '';
  const sharedBadge = (sharedWith && sharedWith.length)
    ? `<span class="chip-btn chip-alert" title="this IP is also used by: ${escapeHtml(sharedWith.join(', '))}">⚠ alt?</span>`
    : '';
  const actions = (eyeBtn||delBtn) ? `<span class="ip-actions">${eyeBtn}${delBtn}</span>` : '';
  return `<span class="ip-cell"><span class="ip-line"><span class="ip">${displaySafe||'—'}</span>${copyBtn}${sharedBadge}</span>${actions}</span>`;
}

function render(){
  const q = search.value.trim().toLowerCase();
  const admin = isAdmin();

  let list = users.filter(u => matchesQuery(u, q));
  list.sort((a,b)=>{
    let va, vb;
    if(sortKey==='ip'){ va=a.latestIp.toLowerCase(); vb=b.latestIp.toLowerCase(); }
    else if(sortKey==='location'){ va=a.latestLocation.toLowerCase(); vb=b.latestLocation.toLowerCase(); }
    else if(sortKey==='lastSeen'){ va=a.latestAddedAt||''; vb=b.latestAddedAt||''; }
    else { va=a.username.toLowerCase(); vb=b.username.toLowerCase(); }
    if(va<vb) return -1*sortDir;
    if(va>vb) return 1*sortDir;
    return 0;
  });

  countEl.innerHTML = `<b>${list.length}</b>players${q?` (of ${users.length})`:''}`;

  if(!users.length && !unlabeled.length){
    mainHolder.innerHTML = '';
    unlabeledHolder.innerHTML = '';
    return;
  }

  if(!list.length){
    mainHolder.innerHTML = `<div class="empty">No matches for <span class="accent">"${q}"</span></div>`;
  } else {
    const arrow = key => sortKey===key ? `<span class="arrow">${sortDir>0?'▲':'▼'}</span>` : '';
    const th = (key,label) => `<th class="${sortKey===key?'sorted':''}" data-key="${key}" tabindex="0" role="button" aria-label="sort by ${label}">${label}${arrow(key)}</th>`;

    let rowsHtml = '';
    list.forEach((u, uIdx) => {
      const key = u.username.toLowerCase();
      const isExpanded = expanded.has(key);
      const multi = u.history.length > 1;
      const parity = uIdx % 2 === 0 ? 'row-even' : 'row-odd';
      const labelInfo = labels.get(key) || {label:'', hidden:false};
      const displayName = escapeHtml(u.username);
      const labelCell = admin
        ? `<input class="label-input" data-key="${escapeHtml(key)}" value="${escapeHtml(labelInfo.label)}" placeholder="+ label">`
        : `<span class="label-static">${escapeHtml(labelInfo.label)||'—'}</span>`;
      const allHistIds = u.history.flatMap(h=>h.ids);
      const nameEdit = admin
        ? `<button class="icon-btn edit-psn-btn chip-btn" data-ids="${allHistIds.join(',')}" data-uname="${escapeHtml(u.username)}" title="edit PSN ID">Edit</button>`
        : '';
      const nameCopyBtn = u.username ? `<button class="icon-btn copy-btn chip-btn chip-icon" data-copy="${escapeHtml(u.username)}" title="copy PSN ID" aria-label="copy PSN ID">⧉</button>` : '';
      const uSelKey = userSelKey(u);
      const rowChecked = selected.has(uSelKey) ? 'checked' : '';
      const latestHidden = ipHidden.get(u.latestIp)||false;
      const rowHideBtn = ipHideBtn(u.latestIp, latestHidden);
      const rowDelBtn = ipDelBtn(u.latestIp, u.history[0].ids);
      const actionGroupContent = `${nameEdit}${rowHideBtn}${rowDelBtn}`;
      const actionGroup = (isExpanded && actionGroupContent) ? `<span class="uname-actions">${actionGroupContent}</span>` : '';
      rowsHtml += `
        <tr class="main-row ${parity} ${isExpanded?'expanded':''}" data-key="${escapeHtml(key)}">
          <td class="checkbox-col"><input type="checkbox" class="row-check" data-sel-key="${escapeHtml(uSelKey)}" ${rowChecked}></td>
          <td>${labelCell}</td>
          <td><span class="caret">${(multi||admin)?'▸':''}</span>${displayName}${nameCopyBtn}${actionGroup}</td>
          <td>${ipCell(u.latestIp, u.history[0].ids, {hidden: latestHidden, showActions:false, sharedWith:sharedIpUsers(u.latestIp, u.username)})}</td>
          <td>${locationCell(u.latestLocation)}
            ${multi?`<span class="badge chip-btn chip-accent" data-key="${escapeHtml(key)}">+${u.history.length-1} more</span>`:''}
          </td>
          <td class="last-seen">${formatLastSeen(u.latestAddedAt)}</td>
        </tr>`;
      if(isExpanded){
        u.history.forEach((h, i) => {
          rowsHtml += `
            <tr class="hist-row ${parity} ${i===0?'newest':''}">
              <td></td>
              <td></td>
              <td></td>
              <td>${ipCell(h.ip, h.ids, {hidden: ipHidden.get(h.ip)||false, showEye:true, sharedWith:sharedIpUsers(h.ip, u.username)})}</td>
              <td>${locationCell(h.location)}${i===0?'<span class="hist-tag">latest</span>':''}</td>
              <td class="last-seen">${formatLastSeen(h.addedAt)}</td>
            </tr>`;
        });
      }
    });

    const allUserSelKeys = list.map(userSelKey);
    const allUsersChecked = allUserSelKeys.length>0 && allUserSelKeys.every(k=>selected.has(k));
    const someUsersChecked = allUserSelKeys.some(k=>selected.has(k));
    const usersIndeterminate = someUsersChecked && !allUsersChecked;

    mainHolder.innerHTML = `
      <table class="main-table">
        <thead><tr>
          <th class="checkbox-col"><input type="checkbox" id="selectAllUsers" class="row-check" ${allUsersChecked?'checked':''}></th>
          <th>Label</th>
          ${th('username','PSN ID')}
          ${th('ip','Latest IP')}
          ${th('location','Latest Location')}
          ${th('lastSeen','Last Seen')}
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    `;

    const selectAllUsersEl = document.getElementById('selectAllUsers');
    if(selectAllUsersEl) selectAllUsersEl.indeterminate = usersIndeterminate;

    selectAllUsersEl.addEventListener('click', e=>{
      e.stopPropagation();
      if(e.target.checked) allUserSelKeys.forEach(k=>selected.add(k));
      else allUserSelKeys.forEach(k=>selected.delete(k));
      render();
    });

    mainHolder.querySelectorAll('.row-check').forEach(cb=>{
      cb.addEventListener('click', e => e.stopPropagation());
      cb.addEventListener('change', e=>{
        const k = cb.dataset.selKey;
        if(cb.checked) selected.add(k); else selected.delete(k);
        renderBulkBar();
        const sa = document.getElementById('selectAllUsers');
        if(sa){
          sa.checked = allUserSelKeys.every(kk=>selected.has(kk));
          sa.indeterminate = allUserSelKeys.some(kk=>selected.has(kk)) && !sa.checked;
        }
      });
    });

    mainHolder.querySelectorAll('thead th').forEach(th=>{
      const doSort = ()=>{
        const key = th.dataset.key;
        if(!key) return;
        if(sortKey === key) sortDir *= -1;
        else { sortKey = key; sortDir = 1; }
        render();
      };
      th.addEventListener('click', doSort);
      th.addEventListener('keydown', e=>{
        if(e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          doSort();
        }
      });
    });

    mainHolder.querySelectorAll('.main-row').forEach(tr=>{
      tr.addEventListener('click', (e)=>{
        if(e.target.closest('.badge') || e.target.closest('.icon-btn') || e.target.closest('.label-input') || e.target.closest('.row-check')) return;
        const key = tr.dataset.key;
        if(expanded.has(key)) expanded.delete(key);
        else expanded.add(key);
        render();
      });
    });
    mainHolder.querySelectorAll('.badge').forEach(b=>{
      b.addEventListener('click', (e)=>{
        e.stopPropagation();
        const key = b.dataset.key;
        if(expanded.has(key)) expanded.delete(key);
        else expanded.add(key);
        render();
      });
    });
  }

  const filteredUnlabeled = unlabeled.filter(u =>
    !q || u.ip.toLowerCase().includes(q) || u.location.toLowerCase().includes(q)
  );

  if(!filteredUnlabeled.length){
    unlabeledHolder.innerHTML = '';
  } else {
    const allUnlabeledSelKeys = filteredUnlabeled.map(unlabeledSelKey);
    const allUnlabeledChecked = allUnlabeledSelKeys.length>0 && allUnlabeledSelKeys.every(k=>selected.has(k));
    const someUnlabeledChecked = allUnlabeledSelKeys.some(k=>selected.has(k));
    const unlabeledIndeterminate = someUnlabeledChecked && !allUnlabeledChecked;

    unlabeledHolder.innerHTML = `
      <section class="block">
        <p class="block-title"><span class="warn">⚠</span> No PSN ID <span class="n">(${filteredUnlabeled.length})</span></p>
        <table class="unlabeled-table">
          <thead><tr>
            <th class="checkbox-col"><input type="checkbox" id="selectAllUnlabeled" class="row-check" ${allUnlabeledChecked?'checked':''}></th>
            <th>Label</th><th>IP Address</th><th>Location</th><th>Times Seen</th><th>Last Seen</th>
          </tr></thead>
          <tbody>
            ${filteredUnlabeled.map(u=>{
              const labelInfo = labels.get(u.labelKey) || {label:'', hidden:false};
              const rowHidden = ipHidden.get(u.ip)||false;
              const isRevealed = revealedUnlabeled.has(u.labelKey);
              const addPsnBtn = admin ? `<button class="add-psn-btn chip-btn chip-ghost" data-ids="${u.ids.join(',')}" data-ip="${escapeHtml(u.ip)}" title="assign a PSN ID to this IP">+ add PSN ID</button>` : '';
              const rowHideBtn = ipHideBtn(u.ip, rowHidden);
              const rowDelBtn = ipDelBtn(u.ip, u.ids);
              const unlabeledActionContent = `${addPsnBtn}${rowHideBtn}${rowDelBtn}`;
              const labelCell = admin
                ? `<input class="label-input" data-key="${escapeHtml(u.labelKey)}" value="${escapeHtml(labelInfo.label)}" placeholder="+ label">${(isRevealed && unlabeledActionContent)?`<span class="uname-actions">${unlabeledActionContent}</span>`:''}`
                : `<span class="label-static">${escapeHtml(labelInfo.label)||'—'}</span>`;
              const uSelKey = unlabeledSelKey(u);
              const rowChecked = selected.has(uSelKey) ? 'checked' : '';
              return `
              <tr class="${admin?'unlabeled-row':''} ${isRevealed?'expanded':''}" data-ids="${u.ids.join(',')}" data-ip="${escapeHtml(u.ip)}" data-location="${escapeHtml(u.location)}" data-label-key="${escapeHtml(u.labelKey)}">
                <td class="checkbox-col"><input type="checkbox" class="row-check unlabeled-check" data-sel-key="${escapeHtml(uSelKey)}" ${rowChecked}></td>
                <td>${labelCell}</td>
                <td>${ipCell(u.ip, u.ids, {hidden: rowHidden, showActions:false, sharedWith:sharedIpUsers(u.ip, '')})}</td>
                <td>${locationCell(u.location)}</td>
                <td>${u.count}</td>
                <td class="last-seen">${formatLastSeen(u.addedAt)}</td>
              </tr>
            `;}).join('')}
          </tbody>
        </table>
      </section>
    `;

    const selectAllUnlabeledEl = document.getElementById('selectAllUnlabeled');
    if(selectAllUnlabeledEl) selectAllUnlabeledEl.indeterminate = unlabeledIndeterminate;

    selectAllUnlabeledEl.addEventListener('click', e=>{
      e.stopPropagation();
      if(e.target.checked) allUnlabeledSelKeys.forEach(k=>selected.add(k));
      else allUnlabeledSelKeys.forEach(k=>selected.delete(k));
      render();
    });

    unlabeledHolder.querySelectorAll('.unlabeled-check').forEach(cb=>{
      cb.addEventListener('change', e=>{
        const k = cb.dataset.selKey;
        if(cb.checked) selected.add(k); else selected.delete(k);
        renderBulkBar();
        const sa = document.getElementById('selectAllUnlabeled');
        if(sa){
          sa.checked = allUnlabeledSelKeys.every(kk=>selected.has(kk));
          sa.indeterminate = allUnlabeledSelKeys.some(kk=>selected.has(kk)) && !sa.checked;
        }
      });
    });

    if(admin){
      const openAddPsn = (tr) => {
        const ids = tr.dataset.ids.split(',').filter(Boolean).map(Number);
        promptLinkOrAddUsername({
          ids,
          location: tr.dataset.location,
          ip: tr.dataset.ip
        });
      };
      unlabeledHolder.querySelectorAll('.add-psn-btn').forEach(btn=>{
        btn.addEventListener('click', e=>{
          e.stopPropagation();
          openAddPsn(btn.closest('tr'));
        });
      });
      unlabeledHolder.querySelectorAll('.unlabeled-row').forEach(tr=>{
        tr.addEventListener('click', e=>{
          if(e.target.closest('.icon-btn') || e.target.closest('.label-input') || e.target.closest('.row-check') || e.target.closest('.add-psn-btn')) return;
          const lk = tr.dataset.labelKey;
          if(revealedUnlabeled.has(lk)) revealedUnlabeled.delete(lk);
          else revealedUnlabeled.add(lk);
          render();
        });
      });
    }
  }

  renderBulkBar();

  if(admin){
    document.querySelectorAll('.label-input').forEach(inp=>{
      inp.addEventListener('click', e => e.stopPropagation());
      let lastSaved = inp.value;
      inp.addEventListener('keydown', e=>{ if(e.key === 'Enter') inp.blur(); });
      inp.addEventListener('blur', ()=>{
        const val = inp.value.trim();
        if(val !== lastSaved){
          lastSaved = val;
          saveLabel(inp.dataset.key, val);
        }
      });
    });
  }

  document.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      copyToClipboard(btn.dataset.copy, btn);
    });
  });
  if(admin){
    document.querySelectorAll('.del-btn').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const ids = btn.dataset.ids.split(',').filter(Boolean).map(Number);
        promptDeleteIp(ids, btn.dataset.ip);
      });
    });
    document.querySelectorAll('.eye-btn').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        promptToggleIpHidden(btn.dataset.ip);
      });
    });
    document.querySelectorAll('.edit-psn-btn').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const ids = btn.dataset.ids.split(',').filter(Boolean).map(Number);
        promptAssignUsername({
          ids,
          currentUsername: btn.dataset.uname,
          title: `Edit PSN ID for ${btn.dataset.uname}`,
          submitLabel: 'Save'
        });
      });
    });
  }
}

function csvEscape(v){
  v = (v==null?'':String(v));
  if(/[",\n]/.test(v)) return '"' + v.replace(/"/g,'""') + '"';
  return v;
}

function exportFilteredCSV(){
  const q = search.value.trim().toLowerCase();
  const list = users.filter(u => matchesQuery(u, q));
  const filteredUnlabeled = unlabeled.filter(u =>
    !q || u.ip.toLowerCase().includes(q) || u.location.toLowerCase().includes(q)
  );

  if(!list.length && !filteredUnlabeled.length){
    showToast('nothing to export');
    return;
  }

  downloadCsvLines(buildCsvLines(list, filteredUnlabeled), 'peer-log-filtered');
  showToast('exported CSV');
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

search.addEventListener('input', render);
exportBtn.addEventListener('click', exportFilteredCSV);
changePassBtn.addEventListener('click', openChangePassword);

init();
</script>
</body>
</html>
